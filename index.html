    </div>
  );
}
function StatLeaders({title, icon, rows, unit, accent}){
  const max=Math.max(1,...rows.map(r=>r.val));
  return (
    <div className="panel">
      <h3 style={{display:"flex",alignItems:"center",gap:8}}><SVG d={icon} size={18}/>{title}</h3>
      <p className="lead">{rows.length} คน · เรียงจากมากไปน้อย</p>
      {rows.length===0
        ? <div className="empty-assist">ยังไม่มีข้อมูล</div>
        : <div className="lead-list">{rows.map((r,i)=>(
            <div className="lead-row" key={r.name}>
              <span className={"rank"+(i===0?" g1":i===1?" g2":i===2?" g3":"")}>{i+1}</span>
              <span className="ava" style={{flex:"0 0 auto"}}>{initials(r.name)}</span>
              <div style={{flex:1,minWidth:0}}>
                <div className="lead-name">{r.name}</div>
                {r.sub && <div className="lead-sub">{r.sub}</div>}
              </div>
              <div className={"lead-bar"+(accent==="amber"?" amber":"")}><i style={{width:Math.round(r.val/max*100)+"%"}}/></div>
              <span className="lead-val">{r.val}<small> {unit}</small></span>
            </div>))}
          </div>}
    </div>
  );
}
function DashboardView({homes, signups}){
  const [q,setQ]=useState("");
  /* ---- รวมสถิติฝั่งผู้จัด Home ---- */
  const hostMap={};
  homes.forEach(h=>{ const k=nrm(h.host_name); const o=hostMap[k]||(hostMap[k]={name:k,homes:0,homeOnly:0,homeSuc:0,done:0,g:0,r:0,list:[]});
    o.homes++; o.list.push(h);
    if((h.kind||"Home")==="Home"){ o.homeOnly++; if(isSuccessHome(h)) o.homeSuc++; }
    o.g+=((h.kind||"Home")==="Call Out"?0:(h.result_g||0)); o.r+=(h.result_r||0);
    if(h.completed) o.done++; });
  const hostRows=Object.values(hostMap);
  /* ---- รวมสถิติฝั่งผู้ช่วย Assist ---- */
  const assistMap={};
  signups.forEach(s=>{ const k=nrm(s.assist_name); const o=assistMap[k]||(assistMap[k]={name:k,count:0,homeIds:[]});
    o.count++; o.homeIds.push(s.home_id); });
  const assistRows=Object.values(assistMap);
  /* ---- ยอดรวม ---- */
  const doneHomes=homes.filter(h=>h.completed);
  const totalG=doneHomes.reduce((n,h)=>n+((h.kind||"Home")==="Call Out"?0:(h.result_g||0)),0);
  const totalR=doneHomes.reduce((n,h)=>n+(h.result_r||0),0);
  /* ---- แยกตามประเภท (4 ชนิด) ---- */
  const grOf=(arr)=>arr.reduce((o,h)=>(h.completed?{g:o.g+(h.result_g||0),r:o.r+(h.result_r||0),done:o.done+1}:o),{g:0,r:0,done:0});
  const kindStats=KINDS.map(k=>{ const items=homes.filter(h=>(h.kind||"Home")===k); return {kind:k, count:items.length, gr:grOf(items)}; });
  /* ---- เกณฑ์รายคน (ทุกคนที่เคยจัดงาน) ---- */
  const critList=Object.keys(hostMap).map(n=>critStats(homes,n)).sort((a,b)=>b.passed-a.passed||b.orgSuccess-a.orgSuccess||b.guest-a.guest);
  const qualified=critList.filter(s=>s.passed===3).length;
  /* ---- leaderboards ---- */
  const hostLeaders=hostRows.filter(h=>h.homeOnly>0).sort((a,b)=>b.homeOnly-a.homeOnly||b.homeSuc-a.homeSuc)
    .map(h=>({name:h.name,val:h.homeOnly,sub:"สำเร็จ "+h.homeSuc+" · ไม่สำเร็จ "+(h.homeOnly-h.homeSuc)}));
  const assistLeaders=assistRows.slice().sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name))
    .map(a=>({name:a.name,val:a.count,sub:null}));
  const guestLeaders=hostRows.filter(h=>h.g>0).sort((a,b)=>b.g-a.g||b.r-a.r)
    .map(h=>({name:h.name,val:h.g,sub:"รวมทุกงาน · "+h.r+" ลงทะเบียน"}));
  const regLeaders=hostRows.filter(h=>h.r>0).sort((a,b)=>b.r-a.r||b.g-a.g)
    .map(h=>({name:h.name,val:h.r,sub:"รวมทุกงาน · "+h.g+" Guest"}));
  /* ---- person lookup ---- */
  const homeById={}; homes.forEach(h=>homeById[h.id]=h);
  const allNames=Array.from(new Set([...Object.keys(hostMap),...Object.keys(assistMap)])).sort();
  const name=nrm(q); const sel=q.trim()?name:"";
  const pHost=sel?hostMap[sel]:null, pAssist=sel?assistMap[sel]:null;
  const helped=pAssist?pAssist.homeIds.map(id=>homeById[id]).filter(Boolean)
    .sort((a,b)=>(b.event_date||"").localeCompare(a.event_date||"")):[];
  return (
    <div className="wrap page">
      <div className="sec-h"><div><div className="eyebrow">Dashboard · สถิติทีม ILP69</div>
        <h2>ใครจัด Home · ใคร Assist · ผลรวม Guest / Register</h2>
        <p>สถิติสะสมจากทุกงานในระบบ · กดดูรายบุคคลได้ที่ช่องค้นหาด้านล่าง</p></div></div>
      <div className="statgrid">
        <div className="stat"><div className="k"><SVG d={I.cal} size={15}/>งานทั้งหมด</div><div className="v">{homes.length}</div><div className="s">จบแล้ว {doneHomes.length} · กำลังจะถึง {homes.length-doneHomes.length}</div></div>
        <div className="stat amber"><div className="k"><SVG d={I.users} size={15}/>Guest (แขกที่มา)</div><div className="v">{totalG}</div><div className="s">งานที่จบแล้ว · ไม่รวม Call Out</div></div>
        <div className="stat green"><div className="k"><SVG d={I.flag} size={15}/>Register (ลงทะเบียน)</div><div className="v">{totalR}</div><div className="s">รวมจากงานที่จบแล้ว</div></div>
        <div className="stat"><div className="k"><SVG d={I.user} size={15}/>ผู้จัดงาน</div><div className="v">{hostRows.length}</div><div className="s">คนที่เคยเปิดงาน</div></div>
        <div className="stat"><div className="k"><SVG d={I.star} size={15}/>การลงชื่อ Assist</div><div className="v">{signups.length}</div><div className="s">{assistRows.length} คนไม่ซ้ำ</div></div>
      </div>

      <div className="eyebrow" style={{marginBottom:10}}>แยกตามประเภท</div>
      <div className="statgrid">
        {kindStats.map(ks=>{ const m=KIND_META[ks.kind]||KIND_META.Home; const isC=ks.kind==="Call Out";
          return (
            <div className="stat" key={ks.kind} style={{background:m.bg}}>
              <div className="k"><SVG d={m.icon} size={15}/>งาน {ks.kind}</div>
              <div className="v" style={{color:m.fg}}>{ks.count}</div>
              <div className="s">จบแล้ว {ks.gr.done} · <b>{ks.gr.g}</b> {isC?"ติดต่อ":"Guest"} · <b>{ks.gr.r}</b> Reg{isC?<span style={{opacity:.7}}> (ไม่นับ G)</span>:""}</div>
            </div>); })}
      </div>

      <div className="dash-cols">
        <StatLeaders title="จัด Home มากสุด" icon={I.trophy} rows={hostLeaders} unit="งาน" />
        <StatLeaders title="Assist มากสุด" icon={I.star} rows={assistLeaders} unit="ครั้ง" accent="amber" />
      </div>
      <div className="dash-cols" style={{marginTop:18}}>
        <StatLeaders title="จำนวน Guest มากที่สุด" icon={I.users} rows={guestLeaders} unit="คน" />
        <StatLeaders title="จำนวนลงทะเบียน มากที่สุด" icon={I.flag} rows={regLeaders} unit="คน" accent="amber" />
      </div>
    </div>
  );
}

/* ===== เกณฑ์รายคน + สถิติรายบุคคล (แท็บแยก) ===== */
function CriteriaView({homes, signups}){
  const [q,setQ]=useState(""); const [fGroup,setFGroup]=useState(""); const [sort,setSort]=useState("group");
  const homeById={}; homes.forEach(h=>homeById[h.id]=h);
  const groupOf=(name)=>{ const hs=homes.filter(h=>nrm(h.host_name)===nrm(name)&&h.host_group!=null);
    if(!hs.length) return null; const c={}; hs.forEach(h=>{c[h.host_group]=(c[h.host_group]||0)+1;});
    return parseInt(Object.keys(c).sort((a,b)=>c[b]-c[a])[0]); };
  const names=Array.from(new Set([...HOST_ROSTER, ...homes.map(h=>nrm(h.host_name))])).filter(Boolean);
  let rows=names.map(n=>({...critStats(homes,n), group:groupOf(n)}));
  const groups=Array.from(new Set(rows.map(r=>r.group).filter(g=>g!=null))).sort((a,b)=>a-b);
  const qualified=rows.filter(r=>r.passed===3).length, activeN=rows.filter(r=>r.total>0).length;
  if(fGroup) rows=rows.filter(r=> fGroup==="none"? r.group==null : String(r.group)===fGroup);
  if(sort==="group") rows.sort((a,b)=> (a.group==null?99:a.group)-(b.group==null?99:b.group) || b.passed-a.passed || b.orgSuccess-a.orgSuccess || a.name.localeCompare(b.name,"th"));
  else rows.sort((a,b)=> b.passed-a.passed || b.orgSuccess-a.orgSuccess || b.guest-a.guest || a.name.localeCompare(b.name,"th"));
  const sel=q.trim()?nrm(q):"";
  const selStats=sel?critStats(homes,sel):null;
  const mineHomes=sel?homes.filter(h=>nrm(h.host_name)===sel).sort((a,b)=>(b.event_date||"").localeCompare(a.event_date||"")):[];
  const helped=sel?signups.filter(s=>nrm(s.assist_name)===sel).map(s=>homeById[s.home_id]).filter(Boolean).sort((a,b)=>(b.event_date||"").localeCompare(a.event_date||"")):[];
  const allNames=Array.from(new Set([...names, ...signups.map(s=>nrm(s.assist_name))])).sort((a,b)=>a.localeCompare(b,"th"));
  return (
    <div className="wrap page">
      <div className="sec-h"><div><div className="eyebrow">เกณฑ์รายคน · Leadership Program</div>
        <h2>การผ่านเกณฑ์ และสถิติรายบุคคล</h2>
        <p>รายชื่อครบทุกคน · กรอง/เรียงตามกลุ่มได้ · กดชื่อเพื่อดูสถิติรายบุคคล · ทำงานแล้ว {activeN} คน · ผ่านครบ {qualified} คน</p></div></div>
      <div className="filterbar">
        <div className="field"><label><SVG d={I.search} size={13}/>ค้นหา / เลือกคน</label>
          <input className="inp" list="critnames" value={q} placeholder="พิมพ์ชื่อเพื่อดูรายบุคคล" onChange={e=>setQ(e.target.value)} />
          <datalist id="critnames">{allNames.map(n=><option key={n} value={n}/>)}</datalist></div>
        <div className="field"><label><SVG d={I.user} size={13}/>กลุ่ม</label>
          <select className="sel" value={fGroup} onChange={e=>setFGroup(e.target.value)}>
            <option value="">— ทุกกลุ่ม —</option>
            {groups.map(g=><option key={g} value={String(g)}>กลุ่ม {g}</option>)}
            <option value="none">ไม่ระบุกลุ่ม</option></select></div>
        <div className="field"><label><SVG d={I.chart} size={13}/>เรียงตาม</label>
          <select className="sel" value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="group">กลุ่ม</option>
            <option value="passed">ผ่านเกณฑ์มากสุด</option></select></div>
        <div className="res">แสดง <b>{rows.length}</b> คน</div>
        {(q||fGroup) && <button className="btn btn-sm" onClick={()=>{setQ("");setFGroup("");}}><SVG d={I.x} size={14}/>ล้าง</button>}
      </div>

      {selStats && <CriteriaPanel s={selStats}/>}
      {sel && (mineHomes.length>0||helped.length>0) && <div className="panel">
        {mineHomes.length>0 && <div style={{marginBottom:helped.length?14:0}}>
          <div className="lead-sub" style={{marginBottom:6,fontWeight:600}}>งานที่จัด ({mineHomes.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {mineHomes.map(h=>{ const {day,mo}=fmtDate(h.event_date);
              return <span className="tagperson" key={h.id}><SVG d={(KIND_META[h.kind||"Home"]||KIND_META.Home).icon} size={13}/>{day} {mo} · {h.kind||"Home"}{h.completed?" · "+resultText(h):""}</span>; })}
          </div></div>}
        {helped.length>0 && <div>
          <div className="lead-sub" style={{marginBottom:6,fontWeight:600}}>เคยไปช่วยงานของ ({helped.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {helped.map((h,i)=>{ const {day,mo}=fmtDate(h.event_date);
              return <span className="tagperson" key={h.id+"_"+i}><span className="ava" style={{width:22,height:22}}>{initials(h.host_name)}</span>{h.host_name} · {day} {mo}</span>; })}
          </div></div>}
      </div>}

      <div className="panel">
        <h3 style={{display:"flex",alignItems:"center",gap:8}}><SVG d={I.trophy} size={18}/>รายชื่อทั้งหมด</h3>
        <p className="lead">เกณฑ์: จัด Home สำเร็จ ≥ {CRIT_ORG} · Guest ≥ {CRIT_GUEST} · ลงทะเบียน ≥ {CRIT_REG} (Home สำเร็จ = Guest ≥ {MIN_GUEST} & ลงทะเบียน ≥ 25%)</p>
        {rows.length===0 ? <div className="empty-assist">ไม่พบรายชื่อตามตัวกรอง</div> :
          <div>{rows.map((r,i)=>{
            const showHdr=sort==="group"&&(i===0||rows[i-1].group!==r.group);
            return (
              <React.Fragment key={r.name}>
                {showHdr && <div className="grpdiv">{r.group!=null?("กลุ่ม "+r.group):"ไม่ระบุกลุ่ม"}</div>}
                <div className={"lead-row click"+(sel===nrm(r.name)?" sel":"")} onClick={()=>setQ(r.name)}>
                  <span className="ava" style={{flex:"0 0 auto"}}>{initials(r.name)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="lead-name">{r.name}</div>
                    <div className="lead-sub">{r.group!=null?("กลุ่ม "+r.group+" · "):""}Home {r.home} · CI {r.center} · ES {r.evening} · Call {r.call}</div></div>
                  <span className={"cpill"+(r.c1?" ok":"")}>จัด {r.orgSuccess}/{CRIT_ORG}</span>
                  <span className={"cpill"+(r.c2?" ok":"")}>G {r.guest}/{CRIT_GUEST}</span>
                  <span className={"cpill"+(r.c3?" ok":"")}>R {r.reg}/{CRIT_REG}</span>
                  <span className={"cstatus"+(r.passed===3?" done":"")}>{r.passed===3?"ผ่าน ✓":r.passed+"/3"}</span>
                </div>
              </React.Fragment>);
          })}</div>}
      </div>
    </div>
  );
}

/* ===== settings ===== */
const SQL_SETUP=`-- ILP69 Home · สร้างตารางใน Supabase (รันครั้งเดียวที่ SQL Editor)
create table if not exists public.ilp69_homes (
  id uuid primary key default gen_random_uuid(),
  host_name text not null,
  host_group int,
  title text,
  event_date date not null,
  time_slot text,
  channel text,
  address text,
  assists_needed int not null default 9,
  completed boolean not null default false,
  result_g int,
  result_r int,
  host_contact text,
  note text,
  created_at timestamptz not null default now()
);

create table if not exists public.ilp69_signups (
  id uuid primary key default gen_random_uuid(),
  home_id uuid not null references public.ilp69_homes(id) on delete cascade,
  assist_name text not null,
  cohort text,
  contact text,
  created_at timestamptz not null default now()
);

create table if not exists public.ilp69_guests (
  id uuid primary key default gen_random_uuid(),
  home_id uuid not null references public.ilp69_homes(id) on delete cascade,
  guest_name text,
  nickname text,
  contact text,
  contact_time text,
  inviter text,
  interested text,
  whats_so text,
  registered boolean not null default false,
  note text,
  created_at timestamptz not null default now()
);

-- เพิ่มคอลัมน์ผู้นำการแนะนำ / Zoom Manager (ปลอดภัยถ้ามีอยู่แล้ว)
alter table public.ilp69_homes add column if not exists intro_leader text;
alter table public.ilp69_homes add column if not exists zoom_manager text;
alter table public.ilp69_homes add column if not exists kind text not null default 'Home';
alter table public.ilp69_homes add column if not exists reflect_work text;
alter table public.ilp69_homes add column if not exists reflect_nowork text;
alter table public.ilp69_homes add column if not exists reflect_missing text;
alter table public.ilp69_homes add column if not exists reflect_next text;
alter table public.ilp69_homes add column if not exists reflect_value text;
alter table public.ilp69_homes add column if not exists reflect_praise text;

create index if not exists ilp69_signups_home_idx on public.ilp69_signups(home_id);
create index if not exists ilp69_guests_home_idx  on public.ilp69_guests(home_id);
create index if not exists ilp69_homes_date_idx on public.ilp69_homes(event_date);

alter table public.ilp69_homes  enable row level security;
alter table public.ilp69_signups enable row level security;
alter table public.ilp69_guests  enable row level security;

create policy "homes_read"   on public.ilp69_homes   for select using (true);
create policy "homes_write"  on public.ilp69_homes   for insert with check (true);
create policy "homes_update" on public.ilp69_homes   for update using (true) with check (true);
create policy "homes_delete" on public.ilp69_homes   for delete using (true);
create policy "su_read"   on public.ilp69_signups for select using (true);
create policy "su_write"  on public.ilp69_signups for insert with check (true);
create policy "su_update" on public.ilp69_signups for update using (true) with check (true);
create policy "su_delete" on public.ilp69_signups for delete using (true);
create policy "gu_read"   on public.ilp69_guests for select using (true);
create policy "gu_write"  on public.ilp69_guests for insert with check (true);
create policy "gu_update" on public.ilp69_guests for update using (true) with check (true);
create policy "gu_delete" on public.ilp69_guests for delete using (true);`;

function SettingsView({cfg, onConnect, onDisconnect, db, toast, onChange}){
  const mode=db.mode;
  const [url,setUrl]=useState(cfg?.url||""); const [key,setKey]=useState(cfg?.key||"");
  const [testing,setTesting]=useState(false); const [importing,setImporting]=useState(false);
  const copy=()=>{ navigator.clipboard.writeText(SQL_SETUP).then(()=>toast("คัดลอก SQL แล้ว")); };
  const test=async()=>{ if(!url.trim()||!key.trim()){ toast("ใส่ URL และ key ก่อน"); return; } setTesting(true);
    try{ const sb=window.supabase.createClient(url.trim(),key.trim());
      const {error}=await sb.from("ilp69_homes").select("id").limit(1); if(error) throw error;
      saveCfg(url,key); toast("เชื่อมต่อสำเร็จ ✦ ใช้งานแบบแชร์ได้แล้ว"); onConnect();
    }catch(e){ toast("เชื่อมต่อไม่ได้: "+(e.message||e)); } setTesting(false); };
  const doImport=async()=>{ try{ const n=await db.countHomes();
      if(n>0 && !window.confirm("ในฐานข้อมูลมี "+n+" งานอยู่แล้ว — นำเข้าเพิ่มอีก "+SEED.length+" งานจากตาราง ILP69? (อาจซ้ำได้)")) return;
      if(n===0 && !window.confirm("นำเข้า "+SEED.length+" งานจากตาราง ILP69 เข้าฐานข้อมูล?")) return;
      setImporting(true); await importSeed(db); toast("นำเข้า "+SEED.length+" งานเรียบร้อย"); onChange();
    }catch(e){ toast("นำเข้าไม่สำเร็จ: "+(e.message||e)); } setImporting(false); };
  return (
    <div className="wrap page" style={{maxWidth:760}}>
      <div className="sec-h"><div><div className="eyebrow">ตั้งค่า</div>
        <h2>เชื่อมต่อฐานข้อมูลกลาง (Supabase)</h2><p>ต่อแล้วทุกคนจะเห็นข้อมูลชุดเดียวกันและอัปเดตสด</p></div></div>
      <div className="panel"><div className={"note "+(mode==="live"?"green":"")}>
        <SVG d={mode==="live"?I.check:I.clock} size={18}/>
        <div>{mode==="live"? <b>กำลังใช้งานแบบแชร์จริง (Supabase) — ข้อมูลซิงก์ให้ทุกคน</b>
          : <><b>ตอนนี้อยู่ในโหมดทดลอง</b> — มีข้อมูล {SEED.length} งานจากตาราง ILP69 ให้ดูแล้ว แต่เก็บในเครื่องนี้เท่านั้น เชื่อมต่อ Supabase ด้านล่างเพื่อใช้งานจริง</>}</div></div></div>
      <div className="panel">
        <h3>ขั้นตอนติดตั้ง (ครั้งเดียว)</h3><p className="lead">ทำตาม 3 ขั้น แล้ววางลิงก์แอปส่งให้ทีมได้เลย</p>
        <ol className="steps">
          <li>เปิดโปรเจกต์ Supabase → <b>SQL Editor</b> → วางสคริปต์ → กด <b>Run</b></li>
          <li><b>Project Settings → API</b> คัดลอก <b>Project URL</b> และ <b>anon / publishable key</b></li>
          <li>วางด้านล่าง → กด <b>เชื่อมต่อ</b> → (ถ้าต้องการ) กด <b>นำเข้าข้อมูล ILP69</b></li>
        </ol>
        <div style={{position:"relative",marginTop:6}}>
          <button className="btn btn-sm" style={{position:"absolute",top:10,right:10,zIndex:2}} onClick={copy}>คัดลอก SQL</button>
          <pre className="sql">{SQL_SETUP}</pre></div>
      </div>
      <div className="panel">
        <h3>ใส่ค่าการเชื่อมต่อ</h3><p className="lead">anon/publishable key เปิดเผยได้ตามปกติ ปลอดภัยด้วย RLS</p>
        <div className="field" style={{marginBottom:12}}><label>Project URL</label>
          <input className="inp" value={url} placeholder="https://xxxxx.supabase.co" onChange={e=>setUrl(e.target.value)} /></div>
        <div className="field" style={{marginBottom:16}}><label>anon / publishable key</label>
          <input className="inp" value={key} placeholder="sb_publishable_... หรือ eyJ..." onChange={e=>setKey(e.target.value)} /></div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn btn-primary" disabled={testing} onClick={test}><SVG d={I.check} size={15}/>{testing?"กำลังทดสอบ…":"ทดสอบ & เชื่อมต่อ"}</button>
          {mode==="live" && <button className="btn btn-amber" disabled={importing} onClick={doImport}>{importing?"กำลังนำเข้า…":"นำเข้าข้อมูล ILP69 ("+SEED.length+" งาน)"}</button>}
          {mode==="live" && <button className="btn" onClick={()=>{clearCfg();onDisconnect();toast("ตัดการเชื่อมต่อแล้ว");}}>ตัดการเชื่อมต่อ</button>}
        </div>
      </div>
      <div className="panel">
        <h3>นำไปใช้งานจริง (Deploy)</h3>
        <ul style={{margin:0,paddingLeft:18,color:"var(--ink-soft)",fontSize:14,lineHeight:1.8}}>
          <li><b>Vercel / Netlify / GitHub Pages</b> — อัปโหลด index.html ไฟล์เดียวก็ใช้ได้</li>
          <li>ไม่อยากให้แต่ละคนตั้งค่าเอง — ใส่ค่าในตัวแปร <b>HARDCODED_URL / HARDCODED_KEY</b> ต้นไฟล์</li>
        </ul>
      </div>
    </div>
  );
}

/* ===== hidden change-log (เปิดด้วยการพิมพ์ 8888) ===== */
function fmtLogTime(s){ try{ const d=new Date(s); return new Intl.DateTimeFormat("th-TH",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}).format(d); }catch(e){ return s||""; } }
function LogModal({db, onClose}){
  const [rows,setRows]=useState(null); const [q,setQ]=useState("");
  const load=useCallback(async()=>{ try{ setRows(await db.listLog(400)); }catch(e){ setRows([]); } },[db]);
  useEffect(()=>{ load(); },[load]);
  const actions=rows?Array.from(new Set(rows.map(r=>r.action))).sort():[];
  const list=(rows||[]).filter(r=>!q||r.action===q);
  return (
    <div className="scrim" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal lg">
        <div className="modal-h"><div className="mark" style={{width:38,height:38}}><SVG d={I.clock} size={18}/></div>
          <div style={{flex:1}}><h3>บันทึกการเปลี่ยนแปลง (Log)</h3>
            <p>หน้าซ่อน · เปิดด้วยการพิมพ์ 8888 · ล่าสุด {rows?rows.length:0} รายการ</p></div>
          <button className="btn btn-sm" onClick={load} style={{marginRight:8}}>รีเฟรช</button>
          <button className="xbtn" onClick={onClose}><SVG d={I.x} size={18}/></button></div>
        <div className="modal-b">
          <div className="filterbar" style={{marginBottom:14}}>
            <div className="field"><label><SVG d={I.search} size={13}/>กรองประเภท</label>
              <select className="sel" value={q} onChange={e=>setQ(e.target.value)}>
                <option value="">— ทั้งหมด —</option>
                {actions.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
            <div className="res">แสดง <b>{list.length}</b> รายการ</div>
          </div>
          {rows===null ? <div className="empty-assist">กำลังโหลด…</div> :
           list.length===0 ? <div className="empty-assist">ยังไม่มีบันทึก</div> :
           <div className="gwrap" style={{maxHeight:"60vh"}}>
             <table className="sumtbl">
               <thead><tr><th>เวลา</th><th>การกระทำ</th><th>รายละเอียด</th></tr></thead>
               <tbody>
                 {list.map(r=>(
                   <tr key={r.id}><td style={{whiteSpace:"nowrap",color:"var(--muted)"}}>{fmtLogTime(r.created_at)}</td>
                     <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{r.action}</td>
                     <td>{r.detail}</td></tr>))}
               </tbody>
             </table>
           </div>}
        </div>
        <div className="modal-f"><button className="btn" onClick={onClose}>ปิด</button></div>
      </div>
    </div>
  );
}

/* ===== app shell ===== */
function App(){
  const [cfg,setCfg]=useState(loadCfg());
  const dataRef=useRef({homes:[],signups:[],guests:[]});
  const [db,setDb]=useState(()=>{ const c=loadCfg(); return withLog(c?makeSupabaseDB(c):makeDemoDB(), ()=>dataRef.current); });
  const [tab,setTab]=useState("board");
  const [homes,setHomes]=useState([]); const [signups,setSignups]=useState([]); const [guests,setGuests]=useState([]);
  const [loading,setLoading]=useState(true); const [showCreate,setShowCreate]=useState(false); const [showLog,setShowLog]=useState(false);
  const [focusId,setFocusId]=useState(()=>{ const m=(window.location.hash||"").match(/home=([\w-]+)/); return m?m[1]:null; });
  const focusedRef=useRef(false);
  const [toastMsg,setToastMsg]=useState(""); const toastT=useRef();
  const toast=useCallback((m)=>{ setToastMsg(m); clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToastMsg(""),2600); },[]);
  const refresh=useCallback(async()=>{ try{ const [h,s,g]=await Promise.all([db.listHomes(),db.listSignups(),db.listGuests()]); setHomes(h); setSignups(s); setGuests(g); dataRef.current={homes:h,signups:s,guests:g}; }
    catch(e){ toast("โหลดข้อมูลไม่สำเร็จ: "+(e.message||e)); } setLoading(false); },[db,toast]);
  useEffect(()=>{ setLoading(true); refresh(); const off=db.subscribe(()=>refresh()); return off; },[db,refresh]);
  useEffect(()=>{ const f=()=>refresh(); window.addEventListener("focus",f); const iv=setInterval(refresh,20000);
    return ()=>{window.removeEventListener("focus",f);clearInterval(iv);}; },[refresh]);
  useEffect(()=>{ const onHash=()=>{ const m=(window.location.hash||"").match(/home=([\w-]+)/); if(m){ focusedRef.current=false; setFocusId(m[1]); } };
    window.addEventListener("hashchange",onHash); return ()=>window.removeEventListener("hashchange",onHash); },[]);
  useEffect(()=>{ let buf=""; const onKey=(e)=>{ if(/^[0-9]$/.test(e.key)){ buf=(buf+e.key).slice(-4); if(buf==="8888"){ buf=""; setShowLog(true); } } else buf=""; };
    window.addEventListener("keydown",onKey); return ()=>window.removeEventListener("keydown",onKey); },[]);
  useEffect(()=>{ if(loading||!focusId||focusedRef.current) return;
    const h=homes.find(x=>x.id===focusId); if(!h){ return; } focusedRef.current=true;
    setTab(isArchived(h)?"archive":"board");
    const t=setTimeout(()=>{ const el=document.getElementById("home-"+focusId);
      if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),1700); }
    },450); return ()=>clearTimeout(t);
  },[loading,focusId,homes]);
  const connect=()=>{ const c=loadCfg(); setCfg(c); setDb(withLog(makeSupabaseDB(c), ()=>dataRef.current)); setTab("board"); };
  const disconnect=()=>{ setCfg(null); setDb(withLog(makeDemoDB(), ()=>dataRef.current)); };
  const upcomingN=homes.filter(h=>!isArchived(h)).length, pastN=homes.filter(isArchived).length;
  const TABS=[{id:"board",label:"บอร์ด",n:upcomingN},{id:"archive",label:"Achieve",n:pastN},{id:"dash",label:"Dashboard"},{id:"members",label:"เกณฑ์รายคน"},{id:"host",label:"มุมมอง Host"}];
  return (
    <div>
      <datalist id="rosterlist">{HOST_ROSTER.map(n=><option key={n} value={n}/>)}</datalist>
      <div className="topbar">
        <div className="topbar-in">
          <div className="brand"><div className="mark"><div><b>69</b><small>ILP</small></div></div>
            <div className="brand-txt"><h1>ILP69 Home · บอร์ดลงชื่อ Assist</h1><p>ผู้จัด Home เปิดงาน · ทีมงานมาลงชื่อช่วยกัน</p></div></div>
          <div className="status"><span className={"dot"+(db.mode==="live"?" live":"")}></span>{db.mode==="live"?"แชร์สด":"โหมดทดลอง"}</div>
        </div>
        <div className="tabs">{TABS.map(t=>(
          <button key={t.id} className="tab" aria-selected={tab===t.id} onClick={()=>setTab(t.id)}>{t.label}{typeof t.n==="number"&&<span className="pill">{t.n}</span>}</button>))}</div>
        <div className="tabsep"></div>
      </div>
      {loading
        ? <div className="wrap page"><div className="deck">{[0,1,2,3].map(i=>
            <div className="card" key={i} style={{padding:18}}>
              <div className="skeleton" style={{height:34,width:90,marginBottom:10}}/>
              <div className="skeleton" style={{height:14,width:"70%",marginBottom:8}}/>
              <div className="skeleton" style={{height:14,width:"50%",marginBottom:18}}/>
              <div className="skeleton" style={{height:44,width:"100%"}}/></div>)}</div></div>
        : <>
            {tab==="board"   && <BoardView   homes={homes} signups={signups} guests={guests} db={db} onChange={refresh} toast={toast} onCreate={()=>setShowCreate(true)} />}
            {tab==="archive" && <ArchiveView homes={homes} signups={signups} guests={guests} db={db} onChange={refresh} toast={toast} />}
            {tab==="dash"    && <DashboardView homes={homes} signups={signups} guests={guests} />}
            {tab==="members" && <CriteriaView homes={homes} signups={signups} />}
            {tab==="host"    && <HostView    homes={homes} signups={signups} guests={guests} db={db} onChange={refresh} toast={toast} onCreate={()=>setShowCreate(true)} />}
          </>}
      {showCreate && <CreateModal db={db} onChange={refresh} toast={toast} onClose={()=>setShowCreate(false)} />}
      {showLog && <LogModal db={db} onClose={()=>setShowLog(false)} />}
      <Toast msg={toastMsg} />
      <div className="footer"><span>ILP69 Home Assist Board</span>
        <span>{db.mode==="live"?"เชื่อมต่อฐานข้อมูลกลางแล้ว":"โหมดทดลอง · ไปที่ ตั้งค่า เพื่อเปิดใช้แบบแชร์"}</span></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
