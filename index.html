<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ILP69 Home · บอร์ดลงชื่อ Assist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF6;--paper-2:#F4F2EA;--ink:#15302B;--ink-soft:#3C544D;--muted:#6B7C76;
    --line:#E4E1D6;--line-strong:#D4D0C2;--green:#0E6E5C;--green-deep:#0A5547;--green-tint:#E6F1ED;
    --amber:#E0942B;--amber-tint:#FBEFD9;--red:#C0392B;--red-deep:#A5322A;--red-tint:#FBE7E4;--red-line:#E7B4AD;
    --shadow:0 1px 2px rgba(21,48,43,.05), 0 8px 24px -12px rgba(21,48,43,.18);
    --shadow-lg:0 24px 60px -24px rgba(21,48,43,.35);--radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(1200px 500px at 100% -10%, #EAF2EE 0%, transparent 60%),
      radial-gradient(900px 400px at -10% 0%, #FBEFD9 0%, transparent 55%),var(--paper);
    color:var(--ink);font-family:"IBM Plex Sans Thai", system-ui, sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:"Bai Jamjuree","IBM Plex Sans Thai",sans-serif;}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:var(--green-deep)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:saturate(1.2) blur(8px);background:rgba(251,250,246,.82);border-bottom:1px solid var(--line)}
  .topbar-in{display:flex;align-items:center;gap:14px;padding:14px 20px;max-width:1180px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .mark{width:42px;height:42px;border-radius:12px;flex:0 0 auto;background:linear-gradient(145deg,var(--green),var(--green-deep));color:#fff;display:grid;place-items:center;font-family:"Bai Jamjuree";font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.25), var(--shadow)}
  .mark small{font-size:9px;letter-spacing:.12em;opacity:.85;display:block;line-height:1;margin-top:2px;font-weight:600}
  .mark b{font-size:16px;line-height:1}
  .brand-txt h1{font-size:17px;margin:0;letter-spacing:-.01em}
  .brand-txt p{margin:1px 0 0;font-size:12px;color:var(--muted)}
  .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--amber)}
  .dot.live{background:var(--green);box-shadow:0 0 0 4px var(--green-tint)}

  .tabs{display:flex;gap:4px;padding:10px 20px 0;max-width:1180px;margin:0 auto;flex-wrap:wrap}
  .tab{border:1px solid transparent;background:transparent;color:var(--ink-soft);padding:9px 15px;border-radius:11px 11px 0 0;font-weight:600;font-size:14px;display:flex;gap:7px;align-items:center}
  .tab .pill{background:var(--paper-2);color:var(--ink-soft);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:600}
  .tab[aria-selected="true"]{background:#fff;border-color:var(--line);border-bottom-color:#fff;color:var(--ink)}
  .tab[aria-selected="true"] .pill{background:var(--green-tint);color:var(--green-deep)}
  .tabsep{height:1px;background:var(--line);margin-top:-1px}
  .page{padding:26px 0 80px}

  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--green-deep);font-weight:700;font-family:"Bai Jamjuree"}
  .sec-h{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:4px 0 18px;flex-wrap:wrap}
  .sec-h h2{font-size:24px;margin:6px 0 0;letter-spacing:-.02em}
  .sec-h p{margin:4px 0 0;color:var(--muted);font-size:14px}

  .btn{border:1px solid var(--line-strong);background:#fff;color:var(--ink);padding:10px 16px;border-radius:11px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:.15s;box-shadow:var(--shadow)}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-primary{background:linear-gradient(145deg,var(--green),var(--green-deep));border-color:var(--green-deep);color:#fff}
  .btn-amber{background:linear-gradient(145deg,#EDA63E,var(--amber));border-color:#C97F1E;color:#3a2607}
  .btn-ghost{background:transparent;box-shadow:none;border-color:transparent;color:var(--green-deep);padding:8px 10px}
  .btn-ghost:hover{background:var(--green-tint)}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:9px}
  .btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}

  /* deck = grid, see all in one page */
  .deck{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;align-items:start}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;position:relative}
  .card.past{opacity:.95}
  .card.urgent-card{border-color:var(--red-line);box-shadow:0 0 0 1px var(--red-line), var(--shadow)}
  .urgent{background:linear-gradient(90deg,var(--red),var(--red-deep));color:#fff;font-family:"Bai Jamjuree";font-weight:700;font-size:12px;padding:7px 14px;display:flex;align-items:center;gap:7px;letter-spacing:.01em}
  .card-top{padding:16px 16px 14px;border-bottom:1px dashed var(--line);position:relative}
  .ribbon{position:absolute;top:14px;right:-1px;font-size:11px;font-weight:700;padding:4px 10px 4px 12px;border-radius:999px 0 0 999px;font-family:"Bai Jamjuree";display:inline-flex;gap:5px;align-items:center}
  .ribbon.open{background:var(--amber-tint);color:#8a5a12}
  .ribbon.full{background:var(--green-tint);color:var(--green-deep)}
  .ribbon.done{background:var(--paper-2);color:var(--muted)}
  .datebig{display:flex;align-items:baseline;gap:8px}
  .datebig .d{font-family:"Bai Jamjuree";font-weight:700;font-size:34px;line-height:1;letter-spacing:-.02em}
  .datebig .mo{font-family:"Bai Jamjuree";font-weight:600;font-size:15px;color:var(--green-deep)}
  .dow{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:500}
  .ctitle{font-family:"Bai Jamjuree";font-weight:600;font-size:16px;margin:10px 0 0;letter-spacing:-.01em;color:var(--ink)}
  .meta{display:flex;flex-direction:column;gap:6px;margin-top:9px}
  .meta .row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft)}
  .meta .row svg{flex:0 0 auto;color:var(--muted)}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--paper-2);color:var(--ink-soft);border:1px solid var(--line);font-family:"Bai Jamjuree"}
  .badge.zoom{background:var(--green-tint);color:var(--green-deep);border-color:#CDE6DD}
  .badge.onsite{background:var(--amber-tint);color:#8a5512;border-color:#EAD9B0}
  .badge.result{background:#0E211C;color:#D9EDE6;border-color:#0E211C}
  .badge.group{background:#ECEAF7;color:#4B3F8F;border-color:#D9D4F0}
  .badge.k-home{background:var(--green-tint);color:var(--green-deep);border-color:#CDE6DD}
  .badge.k-event{background:#EDE7FB;color:#5B3FAE;border-color:#DCD2F4}
  .badge.k-call{background:var(--amber-tint);color:#8a5512;border-color:#EAD9B0}
  .badge.k-es{background:#E3EEF8;color:#2C5A8A;border-color:#CBE0F0}
  .segbtn.on.es{color:#2C5A8A}
  .sumtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:760px}
  .sumtbl th{position:sticky;top:0;z-index:1;background:#CFEFE7;color:var(--green-deep);font-family:"Bai Jamjuree";font-weight:700;font-size:12px;padding:9px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line-strong)}
  .sumtbl td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .sumtbl tr:last-child td{border-bottom:none}
  .sumtbl tr.reg{background:var(--green-tint)}
  .sumtbl .src{font-weight:600;white-space:nowrap}
  .reflecttbl{min-width:1100px}
  .reflecttbl th{font-size:11.5px}
  .reflecttbl .rcell{white-space:normal;min-width:150px;max-width:230px;vertical-align:top;font-size:12.5px;line-height:1.45;color:var(--ink-soft)}
  .sumtbl input[type=checkbox]{width:17px;height:17px;accent-color:var(--green-deep);cursor:pointer}
  .ipill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .ipill.yes{background:var(--green-tint);color:var(--green-deep)}
  .ipill.no{background:var(--paper-2);color:var(--muted)}
  .seg{display:inline-flex;flex-wrap:wrap;background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
  .segbtn{border:none;background:transparent;padding:8px 18px;border-radius:9px;font-weight:600;font-size:14px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:7px}
  .segbtn.on{background:#fff;color:var(--green-deep);box-shadow:var(--shadow)}
  .segbtn.on.ev{color:#5B3FAE}.segbtn.on.co{color:#8a5512}
  /* ===== criteria (เกณฑ์การคัดเลือก) ===== */
  .critgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .crit{border:1px solid var(--line);border-radius:12px;padding:14px 15px;background:var(--paper)}
  .crit.met{border-color:#CDE6DD;background:var(--green-tint)}
  .crit .ct{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13.5px;color:var(--ink-soft)}
  .crit.met .ct{color:var(--green-deep)}
  .crit .cv{font-family:"Bai Jamjuree";font-weight:700;font-size:24px;margin-top:7px;line-height:1}
  .crit .cv small{font-size:13px;color:var(--muted);font-weight:500}
  .crit .cbar{height:7px;border-radius:99px;background:#fff;border:1px solid var(--line);overflow:hidden;margin-top:9px}
  .crit .cbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green-deep))}
  .crit .cstat{font-size:12px;margin-top:7px;color:var(--muted)}
  .crit.met .cstat{color:var(--green-deep);font-weight:600}
  .cpill{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--paper-2);color:var(--muted);border:1px solid var(--line);white-space:nowrap;font-family:"Bai Jamjuree"}
  .cpill.ok{background:var(--green-tint);color:var(--green-deep);border-color:#CDE6DD}
  .cstatus{font-family:"Bai Jamjuree";font-weight:700;font-size:12px;padding:3px 10px;border-radius:999px;background:var(--paper-2);color:var(--muted);white-space:nowrap}
  .cstatus.done{background:#0E211C;color:#D9EDE6}
  .grpdiv{font-family:"Bai Jamjuree";font-weight:700;font-size:12px;color:var(--green-deep);letter-spacing:.04em;padding:14px 6px 6px;border-bottom:2px solid var(--green-tint);margin-bottom:2px}
  .lead-row.click{cursor:pointer;border-radius:9px;padding-left:8px;padding-right:8px}
  .lead-row.click:hover{background:var(--paper-2)}
  .lead-row.sel{background:var(--green-tint)}
  .host{display:inline-flex;align-items:center;gap:7px;margin-top:11px;font-size:13px}
  .host .lbl{color:var(--muted)}
  .ava{width:24px;height:24px;border-radius:50%;background:var(--green-tint);color:var(--green-deep);display:grid;place-items:center;font-weight:700;font-size:11px;font-family:"Bai Jamjuree"}

  .capbar-wrap{padding:13px 16px 6px}
  .capbar-head{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);margin-bottom:7px}
  .capbar-head b{color:var(--ink);font-family:"Bai Jamjuree"}
  .slots{display:flex;gap:5px;flex-wrap:wrap}
  .slot{width:20px;height:9px;border-radius:99px;background:var(--paper-2);border:1px solid var(--line)}
  .slot.on{background:linear-gradient(90deg,var(--green),var(--green-deep));border-color:var(--green-deep)}
  .slot.wait{background:var(--amber);border-color:#C97F1E}

  .assists{padding:8px 16px 4px;display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-height:30px}
  .arow{display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font-size:13.5px}
  .arow .ava{background:#fff;border:1px solid var(--line)}
  .arow .nm{font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:var(--green-tint);color:var(--green-deep);font-family:"Bai Jamjuree";white-space:nowrap}
  .chip.wait{background:var(--amber-tint);color:#8a5a12}
  .xbtn{border:none;background:transparent;color:var(--muted);width:24px;height:24px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto}
  .xbtn:hover{background:var(--red-tint);color:var(--red)}
  .empty-assist{font-size:13px;color:var(--muted);padding:10px 2px;text-align:center}

  .card-foot{padding:12px 16px 16px;margin-top:auto}
  .signform{display:flex;flex-direction:column;gap:8px;margin-top:10px;border-top:1px dashed var(--line);padding-top:12px}

  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
  .inp,.sel,.ta{width:100%;border:1px solid var(--line-strong);background:#fff;border-radius:10px;padding:10px 12px;font-size:14px;color:var(--ink);transition:.15s}
  .inp:focus,.sel:focus,.ta:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-tint)}
  .ta{min-height:60px;resize:vertical}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .addcard{border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:transparent;display:grid;place-items:center;color:var(--green-deep);min-height:200px;text-align:center}
  .addcard:hover{background:#fff;border-color:var(--green)}
  .addcard .plus{width:46px;height:46px;border-radius:14px;background:var(--green-tint);display:grid;place-items:center;margin:0 auto 12px}
  .addcard b{font-family:"Bai Jamjuree";font-size:15px}
  .addcard span{display:block;font-size:12.5px;color:var(--muted);margin-top:3px;max-width:170px}

  .empty{border:1.5px dashed var(--line-strong);border-radius:var(--radius);padding:46px 24px;text-align:center;background:#fff}
  .empty .big{width:60px;height:60px;border-radius:18px;background:var(--green-tint);display:grid;place-items:center;margin:0 auto 16px}
  .empty h3{margin:0 0 6px;font-size:19px}
  .empty p{margin:0 auto 18px;color:var(--muted);max-width:420px;font-size:14px}

  .scrim{position:fixed;inset:0;background:rgba(21,48,43,.42);backdrop-filter:blur(3px);z-index:60;display:grid;place-items:start center;padding:40px 16px;overflow:auto}
  .modal{background:var(--paper);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;overflow:hidden}
  .modal.sm{max-width:420px}
  .modal.lg{max-width:1120px}
  .modal-h{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:#fff}
  .modal-h h3{margin:0;font-size:18px}
  .modal-h p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .modal-b{padding:22px;display:flex;flex-direction:column;gap:14px}
  .modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#fff}

  .hostgrid{display:grid;grid-template-columns:1fr;gap:16px}
  .hostcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .hostcard-h{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .hc-date{flex:0 0 auto;text-align:center;background:var(--green-tint);border-radius:12px;padding:8px 12px;min-width:64px}
  .hc-date .d{font-family:"Bai Jamjuree";font-weight:700;font-size:22px;line-height:1;color:var(--green-deep)}
  .hc-date .mo{font-size:11px;color:var(--green-deep);font-weight:600}
  .hc-main{min-width:0;flex:1}
  .hc-main h4{margin:0;font-size:16px;font-family:"Bai Jamjuree"}
  .hc-main .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .hc-count{text-align:right;flex:0 0 auto}
  .hc-count .n{font-family:"Bai Jamjuree";font-weight:700;font-size:20px}
  .hc-count .l{font-size:11px;color:var(--muted)}
  .hostcard-b{padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .tagperson{display:inline-flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 10px;font-size:13px;font-weight:500}

  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
  .panel h3{margin:0 0 4px;font-size:17px}
  .panel .lead{color:var(--muted);font-size:14px;margin:0 0 16px}
  .note{display:flex;gap:10px;align-items:flex-start;background:var(--amber-tint);border:1px solid #EAD9B0;color:#7a5512;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5}
  .note.green{background:var(--green-tint);border-color:#CDE6DD;color:var(--green-deep)}
  pre.sql{background:#0E211C;color:#D9EDE6;border-radius:12px;padding:16px;overflow:auto;font-size:12.5px;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;margin:0}
  .steps{counter-reset:s;list-style:none;padding:0;margin:0 0 4px}
  .steps li{counter-increment:s;position:relative;padding:0 0 14px 38px;font-size:14px;color:var(--ink-soft);line-height:1.55}
  .steps li::before{content:counter(s);position:absolute;left:0;top:-1px;width:26px;height:26px;border-radius:8px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;font-family:"Bai Jamjuree"}
  .steps li b{color:var(--ink)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:90;box-shadow:var(--shadow-lg);transition:.25s;display:flex;align-items:center;gap:9px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hostpick{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .hostpick .field{flex:1;min-width:220px}
  /* ===== dashboard ===== */
  .statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;position:relative;overflow:hidden}
  .stat .k{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
  .stat .v{font-family:"Bai Jamjuree";font-weight:700;font-size:30px;letter-spacing:-.02em;margin-top:8px;line-height:1}
  .stat .s{font-size:12px;color:var(--muted);margin-top:4px}
  .stat.green{background:linear-gradient(150deg,var(--green-tint),#fff)}
  .stat.green .v{color:var(--green-deep)}
  .stat.amber{background:linear-gradient(150deg,var(--amber-tint),#fff)}
  .stat.amber .v{color:#8a5512}
  .dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  .lead-list{max-height:430px;overflow:auto;margin:0 -4px}
  .lead-row{display:flex;align-items:center;gap:12px;padding:9px 6px;border-bottom:1px solid var(--line)}
  .lead-row:last-child{border-bottom:none}
  .rank{width:26px;height:26px;border-radius:8px;background:var(--paper-2);color:var(--ink-soft);display:grid;place-items:center;font-family:"Bai Jamjuree";font-weight:700;font-size:13px;flex:0 0 auto}
  .rank.g1{background:linear-gradient(145deg,#F6D77A,var(--amber));color:#3a2607}
  .rank.g2{background:#E2DFD3;color:#3C544D}
  .rank.g3{background:#EAD9B0;color:#7a5512}
  .lead-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lead-sub{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:1px}

function rowFromSeed(r){ return { host_name:r.host, host_group:(r.group==null?null:r.group), title:null, kind:"Home", event_date:r.date, time_slot:r.slot, channel:"Online-Zoom",

function makeSupabaseDB(cfg){
  const sb=window.supabase.createClient(cfg.url,cfg.key);
  return {
    mode:"live", client:sb,
    async listHomes(){ const {data,error}=await sb.from("ilp69_homes").select("*").order("event_date",{ascending:true}); if(error) throw error; return data||[]; },
    async listSignups(){ const {data,error}=await sb.from("ilp69_signups").select("*").order("created_at",{ascending:true}); if(error) throw error; return data||[]; },
    async createHome(h){ const {data,error}=await sb.from("ilp69_homes").insert(h).select("id").single(); if(error) throw error; return data.id; },
    async updateHome(id,p){ const {error}=await sb.from("ilp69_homes").update(p).eq("id",id); if(error) throw error; },
    async deleteHome(id){ const {error}=await sb.from("ilp69_homes").delete().eq("id",id); if(error) throw error; },
    async createSignup(s){ const {error}=await sb.from("ilp69_signups").insert(s); if(error) throw error; },
    async updateSignup(id,p){ const {error}=await sb.from("ilp69_signups").update(p).eq("id",id); if(error) throw error; },
    async deleteSignup(id){ const {error}=await sb.from("ilp69_signups").delete().eq("id",id); if(error) throw error; },
    async listGuests(){ const {data,error}=await sb.from("ilp69_guests").select("*").order("created_at",{ascending:true}); if(error) throw error; return data||[]; },
    async createGuest(g){ const {data,error}=await sb.from("ilp69_guests").insert(g).select("id").single(); if(error) throw error; return data.id; },
    async updateGuest(id,p){ const {error}=await sb.from("ilp69_guests").update(p).eq("id",id); if(error) throw error; },
    async deleteGuest(id){ const {error}=await sb.from("ilp69_guests").delete().eq("id",id); if(error) throw error; },
    async writeLog(action,detail){ try{ await sb.from("ilp69_log").insert({action,detail}); }catch(e){} },
    async listLog(limit){ const {data,error}=await sb.from("ilp69_log").select("*").order("created_at",{ascending:false}).limit(limit||300); if(error) throw error; return data||[]; },
    async countHomes(){ const {count,error}=await sb.from("ilp69_homes").select("id",{count:"exact",head:true}); if(error) throw error; return count||0; },
    subscribe(cb){ const ch=sb.channel("ilp69-rt")

      .on("postgres_changes",{event:"*",schema:"public",table:"ilp69_signups"},cb)
      .on("postgres_changes",{event:"*",schema:"public",table:"ilp69_guests"},cb).subscribe();

function makeDemoDB(){

    d.homes=d.homes||[]; d.signups=d.signups||[]; d.guests=d.guests||[]; d.logs=d.logs||[]; return d; };
  const write=(d)=>{ localStorage.setItem(K,JSON.stringify(d)); window.dispatchEvent(new Event("ilp69-demo-change")); };
  const uid=()=>(crypto.randomUUID?crypto.randomUUID():"id"+Date.now()+Math.random().toString(16).slice(2));

  return {

    async deleteHome(id){ const d=read(); d.homes=d.homes.filter(x=>x.id!==id); d.signups=d.signups.filter(x=>x.home_id!==id); d.guests=d.guests.filter(x=>x.home_id!==id); write(d); },
    async createSignup(s){ const d=read(); d.signups.push({...s,id:uid(),created_at:new Date().toISOString()}); write(d); },
    async updateSignup(id,p){ const d=read(); d.signups=d.signups.map(x=>x.id===id?{...x,...p}:x); write(d); },
    async deleteSignup(id){ const d=read(); d.signups=d.signups.filter(x=>x.id!==id); write(d); },
    async listGuests(){ return read().guests.slice().sort((a,b)=>(a.created_at||"").localeCompare(b.created_at||"")); },
    async createGuest(g){ const d=read(); const id=uid(); d.guests.push({...g,id,created_at:new Date().toISOString()}); write(d); return id; },
    async updateGuest(id,p){ const d=read(); d.guests=d.guests.map(x=>x.id===id?{...x,...p}:x); write(d); },
    async deleteGuest(id){ const d=read(); d.guests=d.guests.filter(x=>x.id!==id); write(d); },
    async writeLog(action,detail){ const d=read(); d.logs.push({id:uid(),action,detail,created_at:new Date().toISOString()}); if(d.logs.length>1000) d.logs=d.logs.slice(-1000); write(d); },
    async listLog(limit){ return read().logs.slice().sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||"")).slice(0,limit||300); },
    async countHomes(){ return read().homes.length; },
    subscribe(cb){ const f=()=>cb(); window.addEventListener("ilp69-demo-change",f); window.addEventListener("storage",f);
      return ()=>{window.removeEventListener("ilp69-demo-change",f);window.removeEventListener("storage",f);}; }
  };
}

/* ===== Change-log wrapper (ห่อ db ให้บันทึก log ทุกการเปลี่ยนแปลง) ===== */
const FIELD_LABEL={completed:"สถานะจบงาน",result_g:"Guest",result_r:"ลงทะเบียน",host_name:"ชื่อผู้จัด",host_group:"กลุ่ม",title:"หัวข้อ",event_date:"วันที่",time_slot:"เวลา",kind:"ประเภท",channel:"ช่องทาง",address:"สถานที่",assists_needed:"จำนวน Assist",host_contact:"ติดต่อ Host",note:"หมายเหตุ",intro_leader:"IL",zoom_manager:"ZM",assist_name:"ชื่อผู้ช่วย",guest_name:"ชื่อแขก",nickname:"ชื่อเล่น",contact:"เบอร์",contact_time:"เวลาสะดวก",inviter:"ผู้เชิญ",interested:"ความสนใจ",whats_so:"What's so",registered:"ลงทะเบียน",reflect_work:"สรุป:Work",reflect_nowork:"สรุป:ไม่Work",reflect_missing:"สรุป:Missing",reflect_next:"สรุป:Next",reflect_value:"สรุป:คุณค่า",reflect_praise:"สรุป:ชื่นชม",reflect_completion:"สรุป:Completion",reflect_breakthrough:"สรุป:Breakthrough"};
function patchDesc(p){ return Object.keys(p||{}).map(k=>FIELD_LABEL[k]||k).join(", "); }
function withLog(db, ctx){
  const data=()=>(ctx?ctx():{})||{};
  const shortD=(s)=>{ try{ const f=fmtDate(s); return f.day+" "+f.mo; }catch(e){ return s||"?"; } };
  const homeLbl=(h)=> h?`การ์ด ${h.host_name||"?"} · ${shortD(h.event_date)}`:"(ไม่พบการ์ด)";
  const findHome=(id)=>(data().homes||[]).find(h=>h.id===id);
  const homeOfSignup=(id)=>{ const s=(data().signups||[]).find(x=>x.id===id); return s?findHome(s.home_id):null; };
  const homeOfGuest=(id)=>{ const g=(data().guests||[]).find(x=>x.id===id); return g?findHome(g.home_id):null; };
  const wrap=(action, fn, describe)=> async(...args)=>{ const res=await fn(...args); try{ const d=describe(res,...args); if(d!==null) await db.writeLog(action,d); }catch(e){} return res; };
  return Object.assign({}, db, {
    createHome: wrap("สร้างงาน",  db.createHome.bind(db),  (res,h)=>`${h.kind||"Home"} · การ์ด ${h.host_name||""} · ${shortD(h.event_date)}`),
    updateHome: wrap("แก้ไขงาน",  db.updateHome.bind(db),  (res,id,p)=>{ const ks=Object.keys(p||{}); if(ks.length&&ks.every(k=>k==="result_g"||k==="result_r")) return null; const lbl=homeLbl(findHome(id)); const act=(p&&"completed" in p)?(p.completed?"ติ๊กจบงาน":"เปิดงานกลับ"):("แก้ไข: "+patchDesc(p)); return `${lbl} — ${act}`; }),
    deleteHome: wrap("ลบงาน",     db.deleteHome.bind(db),  (res,id)=>`${homeLbl(findHome(id))} — ลบงานและข้อมูลที่เกี่ยวข้อง`),
    createSignup: wrap("เพิ่มผู้ช่วย", db.createSignup.bind(db), (res,s)=>`${s.assist_name||""} · ${homeLbl(findHome(s.home_id))}`),
    updateSignup: wrap("แก้ไขชื่อผู้ช่วย", db.updateSignup.bind(db), (res,id,p)=>`${(p&&p.assist_name)||"แก้ไข"} · ${homeLbl(homeOfSignup(id))}`),
    deleteSignup: wrap("ถอนผู้ช่วย", db.deleteSignup.bind(db), (res,id)=>`${homeLbl(homeOfSignup(id))}`),
    createGuest: wrap("เพิ่มแขก",  db.createGuest.bind(db), (res,g)=>`${homeLbl(findHome(g.home_id))}`),
    updateGuest: wrap("แก้ไขแขก",  db.updateGuest.bind(db), (res,id,p)=>{ const act=(p&&"registered" in p)?(p.registered?"ติ๊กลงทะเบียน":"ยกเลิกลงทะเบียน"):("แก้ไข: "+patchDesc(p)); return `${act} · ${homeLbl(homeOfGuest(id))}`; }),
    deleteGuest: wrap("ลบแขก",     db.deleteGuest.bind(db), (res,id)=>`ลบรายชื่อ · ${homeLbl(homeOfGuest(id))}`),
  });
}

/* ===== helpers ===== */
const todayStr=()=>{ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); };
const isPast=(s)=> s<todayStr();
const isArchived=(h)=> !!h.completed || isPast(h.event_date);
function daysUntil(s){ const a=new Date(s+"T00:00:00"), t=new Date(todayStr()+"T00:00:00"); return Math.round((a-t)/86400000); }
function urgentLabel(s){ const d=daysUntil(s); return d===0?"วันนี้":(d===1?"พรุ่งนี้":"อีก "+d+" วัน"); }
function fmtDate(s){ const d=new Date(s+"T00:00:00");
  return { day:d.getDate(), mo:new Intl.DateTimeFormat("th-TH",{month:"short"}).format(d), dow:new Intl.DateTimeFormat("th-TH",{weekday:"long"}).format(d) }; }
function initials(n){ n=(n||"").trim(); return n?n.slice(0,1):"?"; }
function resultText(h){ if(h.result_g==null&&h.result_r==null) return "";
  if((h.kind||"Home")==="Call Out") return (h.result_g||0)+" ติดต่อ · "+(h.result_r||0)+"R";
  return (h.result_g||0)+"G "+(h.result_r||0)+"R"; }
function guestLabel(kind){ return (kind||"Home")==="Call Out"?"ติดต่อ":"Guest"; }
function cardLink(id){ return location.origin+location.pathname+"#home="+id; }
async function shareHome(home, toast){ const url=cardLink(home.id); const title=(home.title||home.host_name)+" · ILP69 Home";
  if(navigator.share){ try{ await navigator.share({title,url}); return; }catch(e){ if(e&&e.name==="AbortError") return; } }
  try{ await navigator.clipboard.writeText(url); toast("คัดลอกลิงก์การ์ดแล้ว — แชร์ได้เลย ✦"); }
  catch(e){ window.prompt("คัดลอกลิงก์นี้เพื่อแชร์:", url); } }

/* ===== event card ===== */
function EventCard({home, signups, guests, db, onChange, toast}){
  const [open,setOpen]=useState(false); const [gOpen,setGOpen]=useState(false);
  const list=signups.filter(s=>s.home_id===home.id);
  const glist=(guests||[]).filter(g=>g.home_id===home.id);
  const need=(home.assists_needed==null?9:home.assists_needed), noAssist=need===0, past=isPast(home.event_date);
  const filled=list.length, isFull=filled>=need;
  const {day,mo,dow}=fmtDate(home.event_date);
  const du=daysUntil(home.event_date), urgent=!past && du>=0 && du<=7;
  const slots=[]; for(let i=0;i<Math.max(need,filled);i++) slots.push(<span key={i} className={"slot "+(i<filled?(i<need?"on":"wait"):"")}/>);
  const add=async(p)=>{ try{ await db.createSignup({home_id:home.id,assist_name:p.assist_name,cohort:null,contact:null});
    setOpen(false); toast("ลงชื่อเรียบร้อย ✦ ขอบคุณที่มาช่วยกัน"); onChange(); }catch(e){ toast("บันทึกไม่สำเร็จ: "+(e.message||e)); } };
  const remove=async(id)=>{ try{ await db.deleteSignup(id); toast("ถอนชื่อแล้ว"); onChange(); }catch(e){ toast("ลบไม่สำเร็จ: "+(e.message||e)); } };
  return (
    <div className={"card"+(past?" past":"")+(urgent?" urgent-card":"")} id={"home-"+home.id}>
      {urgent && <div className="urgent"><SVG d={I.bolt} size={14}/>ต้องการด่วน · {urgentLabel(home.event_date)}</div>}
      <div className="card-top">
        <span className={"ribbon "+(past?"done":(isFull?"full":"open"))}>{past?"จบแล้ว":(noAssist?"ไม่ต้องการผู้ช่วย":(isFull?"ครบแล้ว":"ว่าง "+(need-filled)))}</span>
        <div className="datebig"><span className="d">{day}</span><span className="mo">{mo}</span></div>
        <div className="dow">{dow}</div>
        <div className="ctitle">{home.title||home.host_name}</div>
        <div className="meta">
          {home.time_slot && <div className="row"><SVG d={I.clock} size={15}/>{home.time_slot}</div>}
          {home.address && <div className="row"><SVG d={I.pin} size={15}/>{home.address}</div>}
          {home.host_contact && <div className="row"><SVG d={I.phone} size={15}/>{home.host_contact}</div>}
        </div>
        <div className="badges"><KindBadge kind={home.kind}/><ChannelBadge channel={home.channel}/></div>
        <div className="host"><span className="ava">{initials(home.host_name)}</span><span className="lbl">ผู้จัด ·&nbsp;</span><b style={{fontWeight:600}}>{home.host_name}</b></div>
        <HomeInfo home={home}/>
      </div>
      <div className="capbar-wrap">
        <div className="capbar-head"><span>ผู้ช่วย (Assist)</span><span>{noAssist?<><b>{filled}</b> คน · ไม่บังคับ</>:<><b>{filled}</b> / {need}{filled>need?" · +"+(filled-need)+" สำรอง":""}</>}</span></div>
        {!noAssist && <div className="slots">{slots.length?slots:<span className="slot"/>}</div>}
      </div>
      <div className="assists">
        {list.length===0 && <div className="empty-assist">ยังไม่มีใครลงชื่อ · เป็นคนแรกเลย!</div>}
        {list.map((s,idx)=>(
          <div className="arow" key={s.id}>
            <span className="ava">{initials(s.assist_name)}</span>
            <span className="nm">{s.assist_name}</span>
            {need>0 && idx>=need && <span className="chip wait">สำรอง</span>}
            <button className="xbtn" title="ถอนชื่อ" onClick={()=>remove(s.id)}><SVG d={I.x} size={15}/></button>
          </div>
        ))}
      </div>
      {!past && <div className="card-foot">
        {open ? <SignForm full={!noAssist&&isFull} onSubmit={add} onCancel={()=>setOpen(false)}/>
          : <button className="btn btn-amber" style={{width:"100%",justifyContent:"center"}} onClick={()=>setOpen(true)}>
              <SVG d={I.plus} size={16}/>{!noAssist&&isFull?"ลงชื่อเป็นสำรอง":"ลงชื่อช่วยงาน"}</button>}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}} onClick={()=>setGOpen(true)}>
            <SVG d={I.users} size={15}/>{(home.kind||"Home")==="Call Out"?"รายชื่อติดต่อ":"รายละเอียดแขก"}{glist.length>0?((home.kind||"Home")==="Call Out"?` · ${glist.length} ติดต่อ · ${glist.filter(g=>g.registered).length}R`:` · ${glist.filter(g=>g.attended).length}G ${glist.filter(g=>g.registered).length}R`):""}</button>

        </div>
      </div>}
      {gOpen && <GuestModal home={home} guests={guests||[]} db={db} onChange={onChange} toast={toast} onClose={()=>setGOpen(false)} />}
    </div>
  );
}

/* ===== create / edit home modal ===== */
function CreateModal({onClose, db, onChange, toast, defaultHost, home}){
  const edit=!!home;
  const knownSlot=edit&&TIME_SLOTS.includes(home.time_slot);
  const [f,setF]=useState(edit
    ? {host_name:home.host_name||"",host_group:home.host_group==null?"":String(home.host_group),title:home.title||"",kind:home.kind||"Home",
       event_date:home.event_date||"",time_slot:knownSlot?home.time_slot:"อื่นๆ",slotOther:knownSlot?"":(home.time_slot||""),
       channel:home.channel||"Online-Zoom",address:home.address||"",assists_needed:(home.assists_needed==null?9:home.assists_needed),
       host_contact:home.host_contact||"",note:home.note||"",intro_leader:home.intro_leader||"",zoom_manager:home.zoom_manager||""}
    : {host_name:defaultHost||"",host_group:"",title:"",kind:"Home",event_date:"",time_slot:SLOT_EVENING,slotOther:"",
       channel:"Online-Zoom",address:"",assists_needed:9,host_contact:"",note:"",intro_leader:"",zoom_manager:""});
  const [busy,setBusy]=useState(false); const set=(k,v)=>setF(s=>({...s,[k]:v}));
  /* เปลี่ยนประเภท: ตอนสร้างใหม่ Home ตั้ง 9, Event/Call Out ตั้ง 0 (ปรับเองได้) */
  const setKind=(k)=>setF(s=>({...s,kind:k,...(edit?{}:{assists_needed:k==="Home"?9:0})}));
  const onsite=/onsite/i.test(f.channel); const ok=f.host_name.trim()&&f.event_date;
  const save=async()=>{ if(!ok) return; setBusy(true);
    try{ const slot=f.time_slot==="อื่นๆ"?(f.slotOther.trim()||"อื่นๆ"):f.time_slot;
      const payload={ host_name:f.host_name.trim(), host_group:(f.host_group===""?null:parseInt(f.host_group)), title:f.title.trim()||null, kind:f.kind||"Home", event_date:f.event_date, time_slot:slot,

/* ===== guest detail form (ตามชีต “สรุปรายละเอียดแขก”) ===== */
const INTEREST=["","สนใจ","ไม่สนใจ"];
function GuestRow({g, idx, db, onChange, toast, recount, list}){
  const [f,setF]=useState(g);
  useEffect(()=>{ setF(g); },[g.id]);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const persist=async(patch)=>{ try{ await db.updateGuest(g.id,patch); onChange(); }catch(e){ toast("บันทึกไม่สำเร็จ: "+(e.message||e)); } };
  const blur=(k)=>{ if((f[k]||"")!==(g[k]||"")) persist({[k]:f[k]}); };
  const setInt=(v)=>{ set("interested",v); persist({interested:v}); };
  const toggleReg=async()=>{ const v=!f.registered; set("registered",v);
    try{ await db.updateGuest(g.id,{registered:v}); await recount(list.map(x=>x.id===g.id?{...x,registered:v}:x)); onChange(); }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); } };
  const toggleAtt=async()=>{ const v=!f.attended; set("attended",v);
    try{ await db.updateGuest(g.id,{attended:v}); await recount(list.map(x=>x.id===g.id?{...x,attended:v}:x)); onChange(); }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); } };
  const del=async()=>{ try{ await db.deleteGuest(g.id); await recount(list.filter(x=>x.id!==g.id)); onChange(); toast("ลบแขกแล้ว"); }catch(e){ toast("ลบไม่สำเร็จ: "+(e.message||e)); } };
  const cls=f.attended?"reg":(f.interested==="ไม่สนใจ"?"no":"");
  return (
    <tr className={cls}>
      <td className="num">{idx+1}</td>
      <td><input value={f.guest_name||""} placeholder="ชื่อแขก" onChange={e=>set("guest_name",e.target.value)} onBlur={()=>blur("guest_name")} /></td>
      <td><input value={f.nickname||""} placeholder="ชื่อเล่น" onChange={e=>set("nickname",e.target.value)} onBlur={()=>blur("nickname")} /></td>
      <td><input value={f.contact||""} placeholder="เบอร์ติดต่อ" onChange={e=>set("contact",e.target.value)} onBlur={()=>blur("contact")} /></td>
      <td><input value={f.contact_time||""} placeholder="เวลาสะดวก" onChange={e=>set("contact_time",e.target.value)} onBlur={()=>blur("contact_time")} /></td>
      <td><input list="rosterlist" value={f.inviter||""} placeholder="ผู้เชิญ" onChange={e=>set("inviter",e.target.value)} onBlur={()=>blur("inviter")} /></td>
      <td><select className="selint" value={f.interested||""} onChange={e=>setInt(e.target.value)}>
        {INTEREST.map(o=><option key={o} value={o}>{o||"—"}</option>)}</select></td>
      <td><input value={f.whats_so||""} placeholder="What's so" onChange={e=>set("whats_so",e.target.value)} onBlur={()=>blur("whats_so")} /></td>
      <td className="ctr"><input type="checkbox" checked={!!f.attended} onChange={toggleAtt} title="มา (นับเป็น Guest)" /></td>
      <td className="ctr"><input type="checkbox" checked={!!f.registered} onChange={toggleReg} title="ลงทะเบียน" /></td>
      <td><input value={f.note||""} placeholder="หมายเหตุ" onChange={e=>set("note",e.target.value)} onBlur={()=>blur("note")} /></td>
      <td className="ctr"><button className="delg" title="ลบแถว" onClick={del}><SVG d={I.trash} size={15}/></button></td>
    </tr>
  );
}

function BoardView({homes, signups, guests, db, onChange, toast, onCreate}){
  const [fPerson,setFPerson]=useState(""); const [fGroup,setFGroup]=useState(""); const [fDate,setFDate]=useState(""); const [fKind,setFKind]=useState("");
  const upcoming=homes.filter(h=>!isArchived(h)).sort((a,b)=>a.event_date.localeCompare(b.event_date));
  const urgentN=upcoming.filter(h=>{const d=daysUntil(h.event_date);return d>=0&&d<=7;}).length;
  /* ตัวเลือกตัวกรอง (จากงานในบอร์ดเท่านั้น) */
  const upIds=new Set(upcoming.map(h=>h.id));
  const people=Array.from(new Set([...upcoming.map(h=>h.host_name), ...signups.filter(s=>upIds.has(s.home_id)).map(s=>nrm(s.assist_name))])).filter(Boolean).sort();
  const groups=Array.from(new Set(upcoming.map(h=>h.host_group).filter(g=>g!=null))).sort((a,b)=>a-b);
  const dates=Array.from(new Set(upcoming.map(h=>h.event_date))).sort();
  const active=fPerson||fGroup||fDate||fKind;
  const filtered=upcoming.filter(h=>{
    if(fKind && (h.kind||"Home")!==fKind) return false;
    if(fGroup && String(h.host_group||"")!==fGroup) return false;
    if(fDate && h.event_date!==fDate) return false;
    if(fPerson){ const isHost=h.host_name===fPerson; const isAssist=signups.some(s=>s.home_id===h.id && nrm(s.assist_name)===fPerson); if(!isHost&&!isAssist) return false; }
    return true;
  });
  const clear=()=>{ setFPerson(""); setFGroup(""); setFDate(""); setFKind(""); };
  return (
    <div className="wrap page">
      <div className="sec-h">

/* ตารางสรุปแขกในมุมมอง Host — รวมแขกจากทุกการ์ด พร้อมแหล่งที่มา (HI/CI/ES) */
function HostGuestTable({mine, guests, db, onChange, toast}){
  const [fInt,setFInt]=useState(""); const [fReg,setFReg]=useState(""); const [fSrc,setFSrc]=useState(""); const [fAtt,setFAtt]=useState(""); const [q,setQ]=useState("");
  const ids=new Set(mine.map(h=>h.id)); const homeById={}; mine.forEach(h=>homeById[h.id]=h);
  const all=(guests||[]).filter(g=>ids.has(g.home_id)).map(g=>({g,home:homeById[g.home_id]}))
    .sort((a,b)=>((b.home.event_date||"").localeCompare(a.home.event_date||""))||((a.g.created_at||"").localeCompare(b.g.created_at||"")));
  const qq=q.trim().toLowerCase();
  const rows=all.filter(r=>{
    if(fInt){ if(fInt==="ยังไม่ระบุ"){ if(r.g.interested) return false; } else if((r.g.interested||"")!==fInt) return false; }
    if(fAtt){ if(fAtt==="yes"&&!r.g.attended) return false; if(fAtt==="no"&&r.g.attended) return false; }
    if(fReg){ if(fReg==="yes"&&!r.g.registered) return false; if(fReg==="no"&&r.g.registered) return false; }
    if(fSrc && (r.home.kind||"Home")!==fSrc) return false;
    if(qq){ const hay=((r.g.guest_name||"")+" "+(r.g.nickname||"")+" "+(r.g.whats_so||"")).toLowerCase(); if(!hay.includes(qq)) return false; }
    return true;
  });
  const active=fInt||fReg||fSrc||fAtt||q;
  const reg=rows.filter(r=>r.g.registered).length, came=rows.filter(r=>r.g.attended).length;
  const toggleReg=async(g)=>{ const v=!g.registered;
    try{ await db.updateGuest(g.id,{registered:v});
      const newR=(guests||[]).filter(x=>x.home_id===g.home_id).reduce((n,x)=>n+((x.id===g.id?v:x.registered)?1:0),0);
      await db.updateHome(g.home_id,{result_r:newR}); onChange();
    }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); } };
  const toggleAtt=async(g)=>{ const home=homeById[g.home_id]; const isCall=(home&&home.kind||"Home")==="Call Out"; const v=!g.attended;
    try{ await db.updateGuest(g.id,{attended:v});
      if(!isCall){ const newG=(guests||[]).filter(x=>x.home_id===g.home_id).reduce((n,x)=>n+((x.id===g.id?v:x.attended)?1:0),0); await db.updateHome(g.home_id,{result_g:newG}); }
      onChange();
    }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); } };
  return (
    <div className="panel">
      <h3 style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between",flexWrap:"wrap"}}>
        <span style={{display:"flex",alignItems:"center",gap:8}}><SVG d={I.users} size={18}/>ตารางสรุปแขก</span>
        <span className="lead-sub">แสดง {rows.length} / {all.length} คน · มา {came} · ลงทะเบียน {reg}</span></h3>
      <p className="lead">รวมแขกจากทุกการ์ดของคุณ · ติ๊ก “มา” = นับเป็น Guest · กรองตามหัวข้อได้</p>
      {all.length>0 && <div className="filterbar" style={{marginBottom:14}}>
        <div className="field"><label><SVG d={I.search} size={13}/>ค้นหาชื่อ/What's so</label>
          <input className="inp" value={q} placeholder="พิมพ์คำค้น" onChange={e=>setQ(e.target.value)} /></div>
        <div className="field"><label>ความสนใจ</label>
          <select className="sel" value={fInt} onChange={e=>setFInt(e.target.value)}>
            <option value="">— ทั้งหมด —</option><option value="สนใจ">สนใจ</option><option value="ไม่สนใจ">ไม่สนใจ</option><option value="ยังไม่ระบุ">ยังไม่ระบุ</option></select></div>
        <div className="field"><label>มา (Guest)</label>
          <select className="sel" value={fAtt} onChange={e=>setFAtt(e.target.value)}>
            <option value="">— ทั้งหมด —</option><option value="yes">มา</option><option value="no">ไม่มา</option></select></div>
        <div className="field"><label>ลงทะเบียน</label>
          <select className="sel" value={fReg} onChange={e=>setFReg(e.target.value)}>
            <option value="">— ทั้งหมด —</option><option value="yes">ลงทะเบียนแล้ว</option><option value="no">ยังไม่ลง</option></select></div>
        <div className="field"><label>แหล่งที่มา</label>
          <select className="sel" value={fSrc} onChange={e=>setFSrc(e.target.value)}>
            <option value="">— ทั้งหมด —</option>{KINDS.map(k=><option key={k} value={k}>{SRC_LABEL[k]||k}</option>)}</select></div>
        {active && <button className="btn btn-sm" onClick={()=>{setFInt("");setFReg("");setFSrc("");setFAtt("");setQ("");}}><SVG d={I.x} size={14}/>ล้าง</button>}
      </div>}
      {all.length===0 ? <div className="empty-assist">ยังไม่มีรายชื่อแขก — เพิ่มได้ที่ปุ่ม “รายละเอียดแขก” บนการ์ด</div> :
       rows.length===0 ? <div className="empty-assist">ไม่พบแขกตามตัวกรอง</div> :
        <div className="gwrap" style={{maxHeight:"none"}}>
          <table className="sumtbl">
            <thead><tr><th>#</th><th>ชื่อแขก</th><th>สนใจ/ไม่สนใจ</th><th>What's so</th><th>มา</th><th>ลงทะเบียน</th><th>แหล่งที่มา</th><th>วันที่</th></tr></thead>
            <tbody>
              {rows.map((r,i)=>{ const {day,mo}=fmtDate(r.home.event_date); const k=r.home.kind||"Home"; const isCall=k==="Call Out";
                return (
                  <tr key={r.g.id} className={r.g.attended?"reg":""}>
                    <td style={{color:"var(--muted)"}}>{i+1}</td>
                    <td style={{fontWeight:600}}>{r.g.guest_name||r.g.nickname||"—"}</td>
                    <td>{r.g.interested?<span className={"ipill "+(r.g.interested==="สนใจ"?"yes":"no")}>{r.g.interested}</span>:<span style={{color:"var(--muted)"}}>—</span>}</td>
                    <td style={{maxWidth:240}}>{r.g.whats_so||<span style={{color:"var(--muted)"}}>—</span>}</td>
                    <td>{isCall?<span style={{color:"var(--muted)"}}>—</span>:<label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="checkbox" checked={!!r.g.attended} onChange={()=>toggleAtt(r.g)} />{r.g.attended?"✓":""}</label>}</td>
                    <td><label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="checkbox" checked={!!r.g.registered} onChange={()=>toggleReg(r.g)} />{r.g.registered?"✓":""}</label></td>
                    <td><span className="src" style={{color:(KIND_META[k]||KIND_META.Home).fg}}>{SRC_LABEL[k]||k}</span></td>
                    <td style={{whiteSpace:"nowrap"}}>{day} {mo}</td>
                  </tr>); })}
            </tbody>
          </table>
        </div>}
    </div>
  );
}

/* ตารางสรุปกิจกรรมแต่ละครั้งของ Host + ฟิลเตอร์ */
function HostActivityTable({mine, signups}){
  const [fKind,setFKind]=useState(""); const [fStatus,setFStatus]=useState("");

  if(fStatus) rows=rows.filter(h=>statusOf(h)===fStatus);
  const active=fKind||fStatus;
  const stColor={"จบแล้ว":{bg:"var(--green-tint)",c:"var(--green-deep)"},"กำลังจะถึง":{bg:"var(--amber-tint)",c:"#8a5512"},"เลยวันแล้ว":{bg:"var(--paper-2)",c:"var(--muted)"}};
  return (
    <div className="panel">
      <h3 style={{display:"flex",alignItems:"center",gap:8}}><SVG d={I.cal} size={18}/>ตารางสรุปกิจกรรม (แต่ละครั้ง)</h3>
      <div className="filterbar" style={{marginBottom:14}}>
        <div className="field"><label><SVG d={I.flag} size={13}/>ประเภท</label>
          <select className="sel" value={fKind} onChange={e=>setFKind(e.target.value)}>
            <option value="">— ทั้งหมด —</option>{KINDS.map(k=><option key={k} value={k}>{k}</option>)}</select></div>
        <div className="field"><label><SVG d={I.clock} size={13}/>สถานะ</label>
          <select className="sel" value={fStatus} onChange={e=>setFStatus(e.target.value)}>
            <option value="">— ทั้งหมด —</option><option>จบแล้ว</option><option>กำลังจะถึง</option><option>เลยวันแล้ว</option></select></div>
        <div className="res">แสดง <b>{rows.length}</b> / {mine.length} ครั้ง</div>
        {active && <button className="btn btn-sm" onClick={()=>{setFKind("");setFStatus("");}}><SVG d={I.x} size={14}/>ล้าง</button>}
      </div>
      {rows.length===0 ? <div className="empty-assist">ไม่พบกิจกรรมตามตัวกรอง</div> :
        <div className="gwrap" style={{maxHeight:"none"}}>
          <table className="sumtbl">
            <thead><tr><th>วันที่</th><th>ประเภท</th><th>หัวข้อ</th><th>เวลา</th><th>Assist</th><th>Guest/ติดต่อ</th><th>ลงทะเบียน</th><th>สำเร็จ</th><th>สถานะ</th></tr></thead>
            <tbody>
              {rows.map(h=>{ const {day,mo}=fmtDate(h.event_date); const k=h.kind||"Home"; const isCall=k==="Call Out";
                const ac=signups.filter(s=>s.home_id===h.id).length; const need=h.assists_needed==null?9:h.assists_needed;
                const suc=!isCall&&isSuccessHome(h); const st=statusOf(h); const sc=stColor[st]||stColor["เลยวันแล้ว"];
                return (
                  <tr key={h.id}>
                    <td style={{whiteSpace:"nowrap"}}>{day} {mo}</td>
                    <td><KindBadge kind={k}/></td>
                    <td style={{fontWeight:600}}>{h.title||h.host_name}</td>
                    <td style={{whiteSpace:"nowrap",color:"var(--muted)"}}>{h.time_slot||"—"}</td>
                    <td>{ac}/{need}</td>
                    <td>{h.result_g==null?"—":h.result_g}{isCall?" ติดต่อ":""}</td>
                    <td>{h.result_r==null?"—":h.result_r}</td>
                    <td>{isCall?<span style={{color:"var(--muted)"}}>—</span>:(suc?<span className="ipill yes">✓</span>:<span className="ipill no">–</span>)}</td>
                    <td><span className="ipill" style={{background:sc.bg,color:sc.c}}>{st}</span></td>
                  </tr>); })}
            </tbody>
          </table>
        </div>}
    </div>
  );
}
function HostView({homes, signups, guests, db, onChange, toast, onCreate}){
  const [q,setQ]=useState(""); const [completeFor,setCompleteFor]=useState(null); const [guestFor,setGuestFor]=useState(null); const [editFor,setEditFor]=useState(null);

/* ===== dashboard ===== */
const nrm=(s)=>(s||"").trim().replace(/\s+/g," ")||"—";
/* เกณฑ์ Leadership Program: Home สำเร็จ = Guest ≥4 และลงทะเบียน ≥25% ของ Guest */
const CRIT_ORG=3, CRIT_GUEST=25, CRIT_REG=12, MIN_GUEST=4;
const isSuccessHome=(h)=> (h.result_g||0)>=MIN_GUEST && (h.result_r||0)*4>=(h.result_g||0);
function critStats(homes, hostName){
  const key=nrm(hostName); const mine=homes.filter(h=>nrm(h.host_name)===key);
  const cnt=k=>mine.filter(h=>(h.kind||"Home")===k).length;
  const sucCnt=k=>mine.filter(h=>(h.kind||"Home")===k&&isSuccessHome(h)).length;
  const guest=mine.reduce((n,h)=>n+((h.kind||"Home")==="Call Out"?0:(h.result_g||0)),0);
  const reg=mine.reduce((n,h)=>n+(h.result_r||0),0);
  const orgSuccess=mine.filter(h=>(h.kind||"Home")==="Home"&&isSuccessHome(h)).length;
  const c1=orgSuccess>=CRIT_ORG, c2=guest>=CRIT_GUEST, c3=reg>=CRIT_REG;
  return { name:hostName, total:mine.length, home:cnt("Home"), homeSuccess:sucCnt("Home"),
    center:cnt("Center Intro"), evening:cnt("Evening Session"), call:cnt("Call Out"),
    orgSuccess, guest, reg, c1, c2, c3, passed:(c1?1:0)+(c2?1:0)+(c3?1:0) };
}
function CritItem({label, icon, cur, goal, unit, met}){
  const pct=Math.min(100,Math.round(cur/goal*100));
  return (
    <div className={"crit"+(met?" met":"")}>
      <div className="ct"><SVG d={met?I.check:icon} size={15}/>{label}</div>
      <div className="cv">{cur}<small> / {goal} {unit}</small></div>
      <div className="cbar"><i style={{width:pct+"%"}}/></div>
      <div className="cstat">{met?"ผ่านเกณฑ์แล้ว ✓":"อีก "+(goal-cur)+" "+unit}</div>
    </div>
  );
}
function CriteriaPanel({s}){
  return (
    <div className="panel">
      <h3 style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between",flexWrap:"wrap"}}>
        <span style={{display:"flex",alignItems:"center",gap:8}}><SVG d={I.trophy} size={18}/>สถิติส่วนตัว</span>
        <span className={"cstatus"+(s.passed===3?" done":"")}>{s.passed===3?"ผ่านครบ 3/3 ✓":"ผ่าน "+s.passed+"/3"}</span></h3>
      <p className="lead">Home สำเร็จ = มี Guest ≥ {MIN_GUEST} คน และลงทะเบียน ≥ 25% ของ Guest</p>
      <div className="profile" style={{marginBottom:16}}>
        <div className="pbox"><div className="pv">{s.home}</div><div className="pl">Home · สำเร็จ {s.homeSuccess}</div></div>
        <div className="pbox"><div className="pv">{s.center}</div><div className="pl">Center Intro</div></div>
        <div className="pbox"><div className="pv">{s.evening}</div><div className="pl">Evening Session</div></div>
        <div className="pbox"><div className="pv">{s.call}</div><div className="pl">Call Out</div></div>
        <div className="pbox"><div className="pv">{s.guest}</div><div className="pl">Guest รวม</div></div>
        <div className="pbox"><div className="pv">{s.reg}</div><div className="pl">ลงทะเบียนรวม</div></div>
      </div>
      <div className="critgrid">
        <CritItem label="จัด Home สำเร็จ" icon={I.trophy} cur={s.orgSuccess} goal={CRIT_ORG} unit="ครั้ง" met={s.c1}/>
        <CritItem label="Guest มาทั้งหมด" icon={I.users} cur={s.guest} goal={CRIT_GUEST} unit="คน" met={s.c2}/>
        <CritItem label="ลงทะเบียน (ทุกช่องทาง)" icon={I.flag} cur={s.reg} goal={CRIT_REG} unit="คน" met={s.c3}/>
