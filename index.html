<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ILP69 Home · บอร์ดลงชื่อ Assist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF6;--paper-2:#F4F2EA;--ink:#15302B;--ink-soft:#3C544D;--muted:#6B7C76;
    --line:#E4E1D6;--line-strong:#D4D0C2;--green:#0E6E5C;--green-deep:#0A5547;--green-tint:#E6F1ED;
    --amber:#E0942B;--amber-tint:#FBEFD9;--red:#C0392B;--red-deep:#A5322A;--red-tint:#FBE7E4;--red-line:#E7B4AD;
    --shadow:0 1px 2px rgba(21,48,43,.05), 0 8px 24px -12px rgba(21,48,43,.18);
    --shadow-lg:0 24px 60px -24px rgba(21,48,43,.35);--radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(1200px 500px at 100% -10%, #EAF2EE 0%, transparent 60%),
      radial-gradient(900px 400px at -10% 0%, #FBEFD9 0%, transparent 55%),var(--paper);
    color:var(--ink);font-family:"IBM Plex Sans Thai", system-ui, sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:"Bai Jamjuree","IBM Plex Sans Thai",sans-serif;}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:var(--green-deep)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:saturate(1.2) blur(8px);background:rgba(251,250,246,.82);border-bottom:1px solid var(--line)}
  .topbar-in{display:flex;align-items:center;gap:14px;padding:14px 20px;max-width:1180px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .mark{width:42px;height:42px;border-radius:12px;flex:0 0 auto;background:linear-gradient(145deg,var(--green),var(--green-deep));color:#fff;display:grid;place-items:center;font-family:"Bai Jamjuree";font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.25), var(--shadow)}
  .mark small{font-size:9px;letter-spacing:.12em;opacity:.85;display:block;line-height:1;margin-top:2px;font-weight:600}
  .mark b{font-size:16px;line-height:1}
  .brand-txt h1{font-size:17px;margin:0;letter-spacing:-.01em}
  .brand-txt p{margin:1px 0 0;font-size:12px;color:var(--muted)}
  .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--amber)}
  .dot.live{background:var(--green);box-shadow:0 0 0 4px var(--green-tint)}

  .tabs{display:flex;gap:4px;padding:10px 20px 0;max-width:1180px;margin:0 auto;flex-wrap:wrap}
  .tab{border:1px solid transparent;background:transparent;color:var(--ink-soft);padding:9px 15px;border-radius:11px 11px 0 0;font-weight:600;font-size:14px;display:flex;gap:7px;align-items:center}
  .tab .pill{background:var(--paper-2);color:var(--ink-soft);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:600}
  .tab[aria-selected="true"]{background:#fff;border-color:var(--line);border-bottom-color:#fff;color:var(--ink)}
  .tab[aria-selected="true"] .pill{background:var(--green-tint);color:var(--green-deep)}
  .tabsep{height:1px;background:var(--line);margin-top:-1px}
  .page{padding:26px 0 80px}

  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--green-deep);font-weight:700;font-family:"Bai Jamjuree"}
  .sec-h{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:4px 0 18px;flex-wrap:wrap}
  .sec-h h2{font-size:24px;margin:6px 0 0;letter-spacing:-.02em}
  .sec-h p{margin:4px 0 0;color:var(--muted);font-size:14px}

  .btn{border:1px solid var(--line-strong);background:#fff;color:var(--ink);padding:10px 16px;border-radius:11px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:.15s;box-shadow:var(--shadow)}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-primary{background:linear-gradient(145deg,var(--green),var(--green-deep));border-color:var(--green-deep);color:#fff}
  .btn-amber{background:linear-gradient(145deg,#EDA63E,var(--amber));border-color:#C97F1E;color:#3a2607}
  .btn-ghost{background:transparent;box-shadow:none;border-color:transparent;color:var(--green-deep);padding:8px 10px}
  .btn-ghost:hover{background:var(--green-tint)}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:9px}
  .btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}

  /* deck = grid, see all in one page */
  .deck{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;align-items:start}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;position:relative}
  .card.past{opacity:.95}
  .card.urgent-card{border-color:var(--red-line);box-shadow:0 0 0 1px var(--red-line), var(--shadow)}
  .urgent{background:linear-gradient(90deg,var(--red),var(--red-deep));color:#fff;font-family:"Bai Jamjuree";font-weight:700;font-size:12px;padding:7px 14px;display:flex;align-items:center;gap:7px;letter-spacing:.01em}
  .card-top{padding:16px 16px 14px;border-bottom:1px dashed var(--line);position:relative}
  .ribbon{position:absolute;top:14px;right:-1px;font-size:11px;font-weight:700;padding:4px 10px 4px 12px;border-radius:999px 0 0 999px;font-family:"Bai Jamjuree";display:inline-flex;gap:5px;align-items:center}
  .ribbon.open{background:var(--amber-tint);color:#8a5a12}
  .ribbon.full{background:var(--green-tint);color:var(--green-deep)}
  .ribbon.done{background:var(--paper-2);color:var(--muted)}
  .datebig{display:flex;align-items:baseline;gap:8px}
  .datebig .d{font-family:"Bai Jamjuree";font-weight:700;font-size:34px;line-height:1;letter-spacing:-.02em}
  .datebig .mo{font-family:"Bai Jamjuree";font-weight:600;font-size:15px;color:var(--green-deep)}
  .dow{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:500}
  .ctitle{font-family:"Bai Jamjuree";font-weight:600;font-size:16px;margin:10px 0 0;letter-spacing:-.01em;color:var(--ink)}
  .meta{display:flex;flex-direction:column;gap:6px;margin-top:9px}
  .meta .row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft)}
  .meta .row svg{flex:0 0 auto;color:var(--muted)}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--paper-2);color:var(--ink-soft);border:1px solid var(--line);font-family:"Bai Jamjuree"}
  .badge.zoom{background:var(--green-tint);color:var(--green-deep);border-color:#CDE6DD}
  .badge.onsite{background:var(--amber-tint);color:#8a5512;border-color:#EAD9B0}
  .badge.result{background:#0E211C;color:#D9EDE6;border-color:#0E211C}
  .badge.group{background:#ECEAF7;color:#4B3F8F;border-color:#D9D4F0}
  .badge.k-home{background:var(--green-tint);color:var(--green-deep);border-color:#CDE6DD}
  .badge.k-event{background:#EDE7FB;color:#5B3FAE;border-color:#DCD2F4}
  .badge.k-call{background:var(--amber-tint);color:#8a5512;border-color:#EAD9B0}
  .badge.k-es{background:#E3EEF8;color:#2C5A8A;border-color:#CBE0F0}
  .segbtn.on.es{color:#2C5A8A}
  .sumtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:760px}
  .sumtbl th{position:sticky;top:0;z-index:1;background:#CFEFE7;color:var(--green-deep);font-family:"Bai Jamjuree";font-weight:700;font-size:12px;padding:9px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line-strong)}
  .sumtbl td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .sumtbl tr:last-child td{border-bottom:none}
  .sumtbl tr.reg{background:var(--green-tint)}
  .sumtbl .src{font-weight:600;white-space:nowrap}
  .reflecttbl{min-width:1100px}
  .reflecttbl th{font-size:11.5px}
  .reflecttbl .rcell{white-space:normal;min-width:150px;max-width:230px;vertical-align:top;font-size:12.5px;line-height:1.45;color:var(--ink-soft)}
  .sumtbl input[type=checkbox]{width:17px;height:17px;accent-color:var(--green-deep);cursor:pointer}
  .ipill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .ipill.yes{background:var(--green-tint);color:var(--green-deep)}
  .ipill.no{background:var(--paper-2);color:var(--muted)}
  .seg{display:inline-flex;flex-wrap:wrap;background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
  .segbtn{border:none;background:transparent;padding:8px 18px;border-radius:9px;font-weight:600;font-size:14px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:7px}
  .segbtn.on{background:#fff;color:var(--green-deep);box-shadow:var(--shadow)}
  .segbtn.on.ev{color:#5B3FAE}.segbtn.on.co{color:#8a5512}
  /* ===== criteria (เกณฑ์การคัดเลือก) ===== */
  .critgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .crit{border:1px solid var(--line);border-radius:12px;padding:14px 15px;background:var(--paper)}
  .crit.met{border-color:#CDE6DD;background:var(--green-tint)}
  .crit .ct{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13.5px;color:var(--ink-soft)}
  .crit.met .ct{color:var(--green-deep)}
  .crit .cv{font-family:"Bai Jamjuree";font-weight:700;font-size:24px;margin-top:7px;line-height:1}
  .crit .cv small{font-size:13px;color:var(--muted);font-weight:500}
  .crit .cbar{height:7px;border-radius:99px;background:#fff;border:1px solid var(--line);overflow:hidden;margin-top:9px}
  .crit .cbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green-deep))}
  .crit .cstat{font-size:12px;margin-top:7px;color:var(--muted)}
  .crit.met .cstat{color:var(--green-deep);font-weight:600}
  .cpill{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--paper-2);color:var(--muted);border:1px solid var(--line);white-space:nowrap;font-family:"Bai Jamjuree"}
  .cpill.ok{background:var(--green-tint);color:var(--green-deep);border-color:#CDE6DD}
  .cstatus{font-family:"Bai Jamjuree";font-weight:700;font-size:12px;padding:3px 10px;border-radius:999px;background:var(--paper-2);color:var(--muted);white-space:nowrap}
  .cstatus.done{background:#0E211C;color:#D9EDE6}
  .grpdiv{font-family:"Bai Jamjuree";font-weight:700;font-size:12px;color:var(--green-deep);letter-spacing:.04em;padding:14px 6px 6px;border-bottom:2px solid var(--green-tint);margin-bottom:2px}
  .lead-row.click{cursor:pointer;border-radius:9px;padding-left:8px;padding-right:8px}
  .lead-row.click:hover{background:var(--paper-2)}
  .lead-row.sel{background:var(--green-tint)}
  .host{display:inline-flex;align-items:center;gap:7px;margin-top:11px;font-size:13px}
  .host .lbl{color:var(--muted)}
  .ava{width:24px;height:24px;border-radius:50%;background:var(--green-tint);color:var(--green-deep);display:grid;place-items:center;font-weight:700;font-size:11px;font-family:"Bai Jamjuree"}

  .capbar-wrap{padding:13px 16px 6px}
  .capbar-head{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);margin-bottom:7px}
  .capbar-head b{color:var(--ink);font-family:"Bai Jamjuree"}
  .slots{display:flex;gap:5px;flex-wrap:wrap}
  .slot{width:20px;height:9px;border-radius:99px;background:var(--paper-2);border:1px solid var(--line)}
  .slot.on{background:linear-gradient(90deg,var(--green),var(--green-deep));border-color:var(--green-deep)}
  .slot.wait{background:var(--amber);border-color:#C97F1E}

  .assists{padding:8px 16px 4px;display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-height:30px}
  .arow{display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font-size:13.5px}
  .arow .ava{background:#fff;border:1px solid var(--line)}
  .arow .nm{font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:var(--green-tint);color:var(--green-deep);font-family:"Bai Jamjuree";white-space:nowrap}
  .chip.wait{background:var(--amber-tint);color:#8a5a12}
  .xbtn{border:none;background:transparent;color:var(--muted);width:24px;height:24px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto}
  .xbtn:hover{background:var(--red-tint);color:var(--red)}
  .empty-assist{font-size:13px;color:var(--muted);padding:10px 2px;text-align:center}

  .card-foot{padding:12px 16px 16px;margin-top:auto}
  .signform{display:flex;flex-direction:column;gap:8px;margin-top:10px;border-top:1px dashed var(--line);padding-top:12px}

  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
  .inp,.sel,.ta{width:100%;border:1px solid var(--line-strong);background:#fff;border-radius:10px;padding:10px 12px;font-size:14px;color:var(--ink);transition:.15s}
  .inp:focus,.sel:focus,.ta:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-tint)}
  .ta{min-height:60px;resize:vertical}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .addcard{border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:transparent;display:grid;place-items:center;color:var(--green-deep);min-height:200px;text-align:center}
  .addcard:hover{background:#fff;border-color:var(--green)}
  .addcard .plus{width:46px;height:46px;border-radius:14px;background:var(--green-tint);display:grid;place-items:center;margin:0 auto 12px}
  .addcard b{font-family:"Bai Jamjuree";font-size:15px}
  .addcard span{display:block;font-size:12.5px;color:var(--muted);margin-top:3px;max-width:170px}

  .empty{border:1.5px dashed var(--line-strong);border-radius:var(--radius);padding:46px 24px;text-align:center;background:#fff}
  .empty .big{width:60px;height:60px;border-radius:18px;background:var(--green-tint);display:grid;place-items:center;margin:0 auto 16px}
  .empty h3{margin:0 0 6px;font-size:19px}
  .empty p{margin:0 auto 18px;color:var(--muted);max-width:420px;font-size:14px}

  .scrim{position:fixed;inset:0;background:rgba(21,48,43,.42);backdrop-filter:blur(3px);z-index:60;display:grid;place-items:start center;padding:40px 16px;overflow:auto}
  .modal{background:var(--paper);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;overflow:hidden}
  .modal.sm{max-width:420px}
  .modal.lg{max-width:1120px}
  .modal-h{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:#fff}
  .modal-h h3{margin:0;font-size:18px}
  .modal-h p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .modal-b{padding:22px;display:flex;flex-direction:column;gap:14px}
  .modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#fff}

  .hostgrid{display:grid;grid-template-columns:1fr;gap:16px}
  .goaltbl{border-collapse:collapse;font-size:12px;width:max-content;min-width:100%}
  .goaltbl th,.goaltbl td{border:1px solid #e3e8e4;padding:3px 5px}
  .goaltbl th{font-weight:700;text-align:center}
  .goaltbl tr.gsec td{background:#eef4f0;font-weight:700;text-align:left;color:var(--ink-soft)}
  .hostcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .hostcard.gala,.card.gala{border:2px solid transparent;background:linear-gradient(#fff,#fff) padding-box,linear-gradient(120deg,#f7b733,#fc4a1a,#f15bb5,#9b5de5,#00bbf9) border-box;box-shadow:0 10px 34px rgba(155,93,229,.28);position:relative}
  .hostcard.gala::after,.card.gala::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 12% 0%,rgba(247,183,51,.16),transparent 42%),radial-gradient(circle at 92% 8%,rgba(155,93,229,.16),transparent 42%)}
  .gala-banner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800;color:#fff;background:linear-gradient(120deg,#9b5de5,#f15bb5,#fc4a1a,#f7b733,#9b5de5);background-size:220% 100%;animation:galaShine 7s linear infinite;padding:8px 14px;font-size:13.5px;letter-spacing:.3px;text-shadow:0 1px 2px rgba(0,0,0,.22)}
  .gala-stars{letter-spacing:1px;animation:galaTwinkle 1.8s ease-in-out infinite}
  @keyframes galaShine{0%{background-position:0% 50%}100%{background-position:220% 50%}}
  @keyframes galaTwinkle{0%,100%{opacity:1}50%{opacity:.45}}
  .hostcard-h{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .hc-date{flex:0 0 auto;text-align:center;background:var(--green-tint);border-radius:12px;padding:8px 12px;min-width:64px}
  .hc-date .d{font-family:"Bai Jamjuree";font-weight:700;font-size:22px;line-height:1;color:var(--green-deep)}
  .hc-date .mo{font-size:11px;color:var(--green-deep);font-weight:600}
  .hc-main{min-width:0;flex:1}
  .hc-main h4{margin:0;font-size:16px;font-family:"Bai Jamjuree"}
  .hc-main .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .hc-count{text-align:right;flex:0 0 auto}
  .hc-count .n{font-family:"Bai Jamjuree";font-weight:700;font-size:20px}
  .hc-count .l{font-size:11px;color:var(--muted)}
  .hostcard-b{padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .tagperson{display:inline-flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 10px;font-size:13px;font-weight:500}

  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
  .panel h3{margin:0 0 4px;font-size:17px}
  .panel .lead{color:var(--muted);font-size:14px;margin:0 0 16px}
  .note{display:flex;gap:10px;align-items:flex-start;background:var(--amber-tint);border:1px solid #EAD9B0;color:#7a5512;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5}
  .note.green{background:var(--green-tint);border-color:#CDE6DD;color:var(--green-deep)}
  pre.sql{background:#0E211C;color:#D9EDE6;border-radius:12px;padding:16px;overflow:auto;font-size:12.5px;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;margin:0}
  .steps{counter-reset:s;list-style:none;padding:0;margin:0 0 4px}
  .steps li{counter-increment:s;position:relative;padding:0 0 14px 38px;font-size:14px;color:var(--ink-soft);line-height:1.55}
  .steps li::before{content:counter(s);position:absolute;left:0;top:-1px;width:26px;height:26px;border-radius:8px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;font-family:"Bai Jamjuree"}
  .steps li b{color:var(--ink)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:90;box-shadow:var(--shadow-lg);transition:.25s;display:flex;align-items:center;gap:9px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hostpick{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .hostpick .field{flex:1;min-width:220px}
  /* ===== dashboard ===== */
  .statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;position:relative;overflow:hidden}

    async createSignup(s){ const d=read(); d.signups.push({...s,id:uid(),created_at:new Date().toISOString()}); write(d); },
    async updateSignup(id,p){ const d=read(); d.signups=d.signups.map(x=>x.id===id?{...x,...p}:x); write(d); },
    async deleteSignup(id){ const d=read(); d.signups=d.signups.filter(x=>x.id!==id); write(d); },
    async listGuests(){ return read().guests.slice().sort((a,b)=>(a.created_at||"").localeCompare(b.created_at||"")); },
    async createGuest(g){ const d=read(); const id=uid(); d.guests.push({...g,id,created_at:new Date().toISOString()}); write(d); return id; },

    async listLog(limit){ return read().logs.slice().sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||"")).slice(0,limit||300); },
    async listWeekly(){ return read().weekly.slice().sort((a,b)=>((b.week_end||"")+"").localeCompare((a.week_end||"")+"")); },
    async createWeekly(w){ const d=read(); const id=uid(); d.weekly.push({...w,id,created_at:new Date().toISOString()}); write(d); return id; },
    async updateWeekly(id,p){ const d=read(); d.weekly=d.weekly.map(x=>x.id===id?{...x,...p}:x); write(d); },
    async deleteWeekly(id){ const d=read(); d.weekly=d.weekly.filter(x=>x.id!==id); write(d); },

function patchDesc(p){ return Object.keys(p||{}).map(k=>FIELD_LABEL[k]||k).join(", "); }
function withLog(db, ctx){
  const data=()=>(ctx?ctx():{})||{};
  const shortD=(s)=>{ try{ const f=fmtDate(s); return f.day+" "+f.mo; }catch(e){ return s||"?"; } };
  const homeLbl=(h)=> h?`การ์ด ${h.host_name||"?"} · ${shortD(h.event_date)}`:"(ไม่พบการ์ด)";
  const findHome=(id)=>(data().homes||[]).find(h=>h.id===id);
  const homeOfSignup=(id)=>{ const s=(data().signups||[]).find(x=>x.id===id); return s?findHome(s.home_id):null; };
  const homeOfGuest=(id)=>{ const g=(data().guests||[]).find(x=>x.id===id); return g?findHome(g.home_id):null; };
  const wrap=(action, fn, describe)=> async(...args)=>{ const res=await fn(...args); try{ const d=describe(res,...args); if(d!==null) await db.writeLog(action,d); }catch(e){} return res; };
  return Object.assign({}, db, {
    createHome: wrap("สร้างงาน",  db.createHome.bind(db),  (res,h)=>`${h.kind||"Home"} · การ์ด ${h.host_name||""} · ${shortD(h.event_date)}`),
    updateHome: wrap("แก้ไขงาน",  db.updateHome.bind(db),  (res,id,p)=>{ const ks=Object.keys(p||{}); if(ks.length&&ks.every(k=>k==="result_g"||k==="result_r")) return null; const lbl=homeLbl(findHome(id)); const act=(p&&"completed" in p)?(p.completed?"ติ๊กจบงาน":"เปิดงานกลับ"):("แก้ไข: "+patchDesc(p)); return `${lbl} — ${act}`; }),
    deleteHome: wrap("ลบงาน",     db.deleteHome.bind(db),  (res,id)=>`${homeLbl(findHome(id))} — ลบงานและข้อมูลที่เกี่ยวข้อง`),
    createSignup: wrap("เพิ่มผู้ช่วย", db.createSignup.bind(db), (res,s)=>`${s.assist_name||""} · ${homeLbl(findHome(s.home_id))}`),
    updateSignup: wrap("แก้ไขชื่อผู้ช่วย", db.updateSignup.bind(db), (res,id,p)=>`${(p&&p.assist_name)||"แก้ไข"} · ${homeLbl(homeOfSignup(id))}`),
    deleteSignup: wrap("ถอนผู้ช่วย", db.deleteSignup.bind(db), (res,id)=>`${homeLbl(homeOfSignup(id))}`),
    createGuest: wrap("เพิ่มแขก",  db.createGuest.bind(db), (res,g)=>`${homeLbl(findHome(g.home_id))}`),
    updateGuest: wrap("แก้ไขแขก",  db.updateGuest.bind(db), (res,id,p)=>{ const act=(p&&"registered" in p)?(p.registered?"ติ๊กลงทะเบียน":"ยกเลิกลงทะเบียน"):("แก้ไข: "+patchDesc(p)); return `${act} · ${homeLbl(homeOfGuest(id))}`; }),
    deleteGuest: wrap("ลบแขก",     db.deleteGuest.bind(db), (res,id)=>`ลบรายชื่อ · ${homeLbl(homeOfGuest(id))}`),
  });
}

/* ===== helpers ===== */
const todayStr=()=>{ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); };
const isPast=(s)=> s<todayStr();
/* งานที่ "วันที่ถึงแล้ว" (วันนี้หรือก่อนหน้า) — ใช้กรองสถิติ Guest/ลงทะเบียน ไม่ให้นับงานในอนาคต */
const arrived=(h)=> !!h && !!h.event_date && h.event_date<=todayStr();
const isArchived=(h)=> !!h.completed || isPast(h.event_date);
/* ผู้จัดส่วนกลาง (Landmark) — งานเหล่านี้ขึ้นในมุมมอง Host ของทุกคน */
const CENTRAL_HOST="Landmark";
const isCentral=(h)=> ((h&&h.host_name)||"").trim().toLowerCase()===CENTRAL_HOST.toLowerCase();
/* การ์ดพิเศษ: Evening Session แข่งขัน "ขึ้นดาว" วันที่ 24 มิ.ย. */
const isGala=(h)=> !!h && (h.kind||"")==="Evening Session" && h.event_date==="2026-06-24";
function daysUntil(s){ const a=new Date(s+"T00:00:00"), t=new Date(todayStr()+"T00:00:00"); return Math.round((a-t)/86400000); }
function urgentLabel(s){ const d=daysUntil(s); return d===0?"วันนี้":(d===1?"พรุ่งนี้":"อีก "+d+" วัน"); }
function fmtDate(s){ const d=new Date(s+"T00:00:00");
  return { day:d.getDate(), mo:new Intl.DateTimeFormat("th-TH",{month:"short"}).format(d), dow:new Intl.DateTimeFormat("th-TH",{weekday:"long"}).format(d) }; }
function initials(n){ n=(n||"").trim(); return n?n.slice(0,1):"?"; }
function resultText(h){ if(h.result_g==null&&h.result_r==null) return "";
  if((h.kind||"Home")==="Call Out") return (h.result_g||0)+" ติดต่อ · "+(h.result_r||0)+"R";
  return (h.result_g||0)+"G "+(h.result_r||0)+"R"; }

/* สร้างลิงก์เพิ่ม event ลง Google Calendar พร้อมรายละเอียด */
function gcalUrl(home){
  const pad=n=>String(n).padStart(2,"0"); const ymd=(home.event_date||"").replace(/-/g,"");
  const m=(home.time_slot||"").match(/(\d{1,2})[.:](\d{2})\s*-\s*(\d{1,2})[.:](\d{2})/);
  let dates;
  if(m && ymd){ dates=`${ymd}T${pad(m[1])}${m[2]}00/${ymd}T${pad(m[3])}${m[4]}00`; }
  else if(ymd){ const d=new Date(home.event_date+"T00:00:00"); const nx=new Date(d.getTime()+86400000);
    dates=`${ymd}/${nx.getFullYear()}${pad(nx.getMonth()+1)}${pad(nx.getDate())}`; }
  const title=(home.kind||"Home")+" · "+(home.title||home.host_name||"ILP69");
  const onsite=/onsite|พบตัว/i.test(home.channel||""); const loc=(onsite&&home.address)?home.address:(home.channel||"");
  const details=[
    "ผู้จัด: "+(home.host_name||"-"),
    home.kind?("ประเภท: "+home.kind):"",
    home.time_slot?("เวลา: "+home.time_slot):"",
    home.intro_leader?("Introduction Leader: "+home.intro_leader):"",
    home.zoom_manager?("Zoom Manager: "+home.zoom_manager):"",
    home.channel?("ช่องทาง: "+home.channel):"",
    (!onsite&&home.address)?("Address: "+home.address):"",
    home.host_contact?("ติดต่อ Host: "+home.host_contact):"",
    home.note?("หมายเหตุ: "+home.note):"",
    "ลิงก์การ์ด: "+cardLink(home.id),
  ].filter(Boolean).join("\n");
  const p=new URLSearchParams({action:"TEMPLATE",text:title,details,ctz:"Asia/Bangkok"});
  if(dates) p.set("dates",dates); if(loc) p.set("location",loc);
  return "https://calendar.google.com/calendar/render?"+p.toString();
}

function ChannelBadge({channel}){ if(!channel) return null; const onsite=/onsite|พบตัว/i.test(channel);
  return <span className={"badge "+(onsite?"onsite":"zoom")}><SVG d={onsite?I.pin:I.video} size={12}/>{channel}</span>; }

const KIND_META={
  "Home":{cls:"k-home",icon:I.cal,seg:"",bg:"linear-gradient(150deg,var(--green-tint),#fff)",fg:"var(--green-deep)"},
  "Center Intro":{cls:"k-event",icon:I.star,seg:" ev",bg:"linear-gradient(150deg,#EDE7FB,#fff)",fg:"#5B3FAE"},
  "Evening Session":{cls:"k-es",icon:I.clock,seg:" es",bg:"linear-gradient(150deg,#E3EEF8,#fff)",fg:"#2C5A8A"},
  "Call Out":{cls:"k-call",icon:I.phone,seg:" co",bg:"linear-gradient(150deg,var(--amber-tint),#fff)",fg:"#8a5512"},
};
const KINDS=["Home","Center Intro","Evening Session","Call Out"];
const SRC_LABEL={"Home":"HI · Home Intro","Center Intro":"CI · Center Intro","Evening Session":"ES · Evening Session","Call Out":"โทร · Call Out"};
function KindBadge({kind}){ const k=kind||"Home"; const m=KIND_META[k]||KIND_META.Home; return <span className={"badge "+m.cls}><SVG d={m.icon} size={11}/>{k}</span>; }

/* แถบข้อมูลบนการ์ด: กลุ่ม / Introduction Leader / Zoom Manager (โชว์เสมอ) */
function HomeInfo({home}){
  const cell=(icon,label,val)=>(
    <span className={"ci"+(val?"":" empty")} title={label+": "+(val||"ยังไม่ระบุ")}>
      <SVG d={icon} size={12}/><b>{label}</b><span>{val||"—"}</span></span>);
  return (
    <div className="cardinfo">
      {cell(I.user,"กลุ่ม", home.host_group?String(home.host_group):"")}
      {cell(I.star,"IL", home.intro_leader)}
      {cell(I.video,"ZM", home.zoom_manager)}
    </div>
  );
}

/* แถวผู้ช่วยแบบแก้ไขชื่อได้ (ใช้กับงานที่จบแล้ว) */
function AssistEditRow({s, db, onChange, toast}){
  const [v,setV]=useState(s.assist_name||""); useEffect(()=>{ setV(s.assist_name||""); },[s.id]);
  const save=async()=>{ const nv=v.trim(); if(!nv){ setV(s.assist_name||""); return; } if(nv===(s.assist_name||"")) return;
    try{ await db.updateSignup(s.id,{assist_name:nv}); onChange(); toast("แก้ไขชื่อแล้ว"); }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); setV(s.assist_name||""); } };
  const del=async()=>{ try{ await db.deleteSignup(s.id); onChange(); toast("ถอนชื่อแล้ว"); }catch(e){ toast("ลบไม่สำเร็จ: "+(e.message||e)); } };
  return (
    <div className="arow">
      <span className="ava">{initials(v)}</span>
      <input className="nm-edit" value={v} onChange={e=>setV(e.target.value)} onBlur={save}
        onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} title="แก้ไขชื่อแล้วกด Enter" />
      <button className="xbtn" title="ถอนชื่อ" onClick={del}><SVG d={I.x} size={15}/></button>
    </div>
  );
}
function ArchiveAssists({home, list, db, onChange, toast}){
  const [add,setAdd]=useState(false);
  const doAdd=async(p)=>{ try{ await db.createSignup({home_id:home.id,assist_name:p.assist_name,cohort:null,contact:null}); setAdd(false); onChange(); toast("เพิ่มผู้ช่วยแล้ว"); }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); } };
  return (
    <div className="assists">
      {list.length===0 && <div className="empty-assist">ยังไม่มีผู้ช่วย — กดเพิ่มได้</div>}
      {list.map(s=><AssistEditRow key={s.id} s={s} db={db} onChange={onChange} toast={toast} />)}
      {add
        ? <SignForm onSubmit={doAdd} onCancel={()=>setAdd(false)} />
        : <button className="btn btn-ghost btn-sm" style={{justifyContent:"center",marginTop:2}} onClick={()=>setAdd(true)}><SVG d={I.plus} size={14}/>เพิ่มผู้ช่วย</button>}
    </div>
  );
}

/* ===== sign-up form (ไม่มีรุ่น) ===== */
function SignForm({onSubmit,onCancel,full}){
  const [name,setName]=useState(""); const [busy,setBusy]=useState(false);
  const submit=async()=>{ if(!name.trim()) return; setBusy(true); await onSubmit({assist_name:name.trim()}); setBusy(false); };
  return (
    <div className="signform">
      <div className="field"><label>ลงชื่อช่วยงาน · เลือกจากรายชื่อ หรือพิมพ์เองได้</label>
        <input className="inp" list="assistroster" value={name} autoFocus placeholder="เลือก/พิมพ์ชื่อ เช่น เอก กรฤต"
          onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} />
        <datalist id="assistroster">{HOST_ROSTER.map(n=><option key={n} value={n}/>)}</datalist></div>
      {full && <div className="note" style={{padding:"8px 11px"}}>เต็มแล้ว — ชื่อของคุณจะถูกบันทึกเป็น <b style={{marginLeft:4}}>สำรอง</b></div>}
      <div style={{display:"flex",gap:8}}>
        <button className="btn btn-primary btn-sm" disabled={busy||!name.trim()} onClick={submit} style={{flex:1,justifyContent:"center"}}>
          <SVG d={I.check} size={15}/>{busy?"กำลังบันทึก…":"ยืนยันลงชื่อ"}</button>
        <button className="btn btn-sm" onClick={onCancel}>ยกเลิก</button>
      </div>
    </div>
  );
}

/* ===== event card ===== */
function EventCard({home, signups, guests, homes, db, onChange, toast}){
  const [open,setOpen]=useState(false); const [gOpen,setGOpen]=useState(false); const [rOpen,setROpen]=useState(false);
  const list=signups.filter(s=>s.home_id===home.id);
  const glist=(guests||[]).filter(g=>g.home_id===home.id);
  const need=(home.assists_needed==null?9:home.assists_needed), noAssist=need===0, past=isPast(home.event_date);
  const filled=list.length, isFull=filled>=need;
  const {day,mo,dow}=fmtDate(home.event_date);
  const du=daysUntil(home.event_date), urgent=!past && du>=0 && du<=7;
  const gala=isGala(home);
  const slots=[]; for(let i=0;i<Math.max(need,filled);i++) slots.push(<span key={i} className={"slot "+(i<filled?(i<need?"on":"wait"):"")}/>);
  const add=async(p)=>{ try{ await db.createSignup({home_id:home.id,assist_name:p.assist_name,cohort:null,contact:null});
    setOpen(false); toast("ลงชื่อเรียบร้อย ✦ ขอบคุณที่มาช่วยกัน"); onChange(); }catch(e){ toast("บันทึกไม่สำเร็จ: "+(e.message||e)); } };
  const remove=async(id)=>{ try{ await db.deleteSignup(id); toast("ถอนชื่อแล้ว"); onChange(); }catch(e){ toast("ลบไม่สำเร็จ: "+(e.message||e)); } };
  return (
    <div className={"card"+(past?" past":"")+(urgent?" urgent-card":"")+(gala?" gala":"")} id={"home-"+home.id}>
      {gala && <div className="gala-banner"><span className="gala-stars">⭐⭐⭐</span>🎉 EVENT แข่งขัน · ขึ้นดาว · เฉลิมฉลอง 🏆<span className="gala-stars">⭐⭐⭐</span></div>}
      {urgent && <div className="urgent"><SVG d={I.bolt} size={14}/>ต้องการด่วน · {urgentLabel(home.event_date)}</div>}
      <div className="card-top">
        <span className={"ribbon "+(past?"done":(isFull?"full":"open"))}>{past?"จบแล้ว":(noAssist?"ไม่ต้องการผู้ช่วย":(isFull?"ครบแล้ว":"ว่าง "+(need-filled)))}</span>
        <div className="datebig"><span className="d">{day}</span><span className="mo">{mo}</span></div>
        <div className="dow">{dow}</div>
        <div className="ctitle">{home.title||home.host_name}</div>
        <div className="meta">
          {home.time_slot && <div className="row"><SVG d={I.clock} size={15}/>{home.time_slot}</div>}
          {home.address && <div className="row"><SVG d={I.pin} size={15}/>{home.address}</div>}
          {home.host_contact && <div className="row"><SVG d={I.phone} size={15}/>{home.host_contact}</div>}
        </div>
        <div className="badges"><KindBadge kind={home.kind}/><ChannelBadge channel={home.channel}/></div>
        <div className="host"><span className="ava">{initials(home.host_name)}</span><span className="lbl">ผู้จัด ·&nbsp;</span><b style={{fontWeight:600}}>{home.host_name}</b></div>
        <HomeInfo home={home}/>
      </div>
      <div className="capbar-wrap">
        <div className="capbar-head"><span>ผู้ช่วย (Assist)</span><span>{noAssist?<><b>{filled}</b> คน · ไม่บังคับ</>:<><b>{filled}</b> / {need}{filled>need?" · +"+(filled-need)+" สำรอง":""}</>}</span></div>
        {!noAssist && <div className="slots">{slots.length?slots:<span className="slot"/>}</div>}
      </div>
      <div className="assists">
        {list.length===0 && <div className="empty-assist">ยังไม่มีใครลงชื่อ · เป็นคนแรกเลย!</div>}
        {list.map((s,idx)=>(
          <div className="arow" key={s.id}>
            <span className="ava">{initials(s.assist_name)}</span>
            <span className="nm">{s.assist_name}</span>
            {need>0 && idx>=need && <span className="chip wait">สำรอง</span>}
            <button className="xbtn" title="ถอนชื่อ" onClick={()=>remove(s.id)}><SVG d={I.x} size={15}/></button>
          </div>
        ))}
      </div>
      {!past && <div className="card-foot">
        {open ? <SignForm full={!noAssist&&isFull} onSubmit={add} onCancel={()=>setOpen(false)}/>
          : <button className="btn btn-amber" style={{width:"100%",justifyContent:"center"}} onClick={()=>setOpen(true)}>
              <SVG d={I.plus} size={16}/>{!noAssist&&isFull?"ลงชื่อเป็นสำรอง":"ลงชื่อช่วยงาน"}</button>}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}} onClick={()=>setGOpen(true)}>
            <SVG d={I.users} size={15}/>{(home.kind||"Home")==="Call Out"?"รายชื่อติดต่อ":"รายละเอียดแขก"}{glist.length>0?((home.kind||"Home")==="Call Out"?` · ${glist.length} ติดต่อ · ${glist.filter(g=>g.registered).length}R`:` · ${glist.filter(g=>g.attended).length}G ${glist.filter(g=>g.registered).length}R`):""}</button>
          {(home.kind||"Home")==="Call Out" && <button className="btn btn-ghost btn-sm share-ic" title="พิมพ์รายงาน Call Out" onClick={()=>setROpen(true)}><SVG d={I.flag} size={15}/></button>}
          <a className="btn btn-ghost btn-sm share-ic" title="เพิ่มลง Google Calendar" href={gcalUrl(home)} target="_blank" rel="noopener noreferrer"><SVG d={I.cal} size={15}/></a>
          <button className="btn btn-ghost btn-sm share-ic" title="คัดลอกลิงก์แชร์การ์ดนี้" onClick={()=>shareHome(home,toast)}><SVG d={I.share} size={15}/></button>
        </div>
      </div>}
      {gOpen && <GuestModal home={home} guests={guests||[]} homes={homes} db={db} onChange={onChange} toast={toast} onClose={()=>setGOpen(false)} />}
      {rOpen && <CallReport home={home} guests={guests||[]} onClose={()=>setROpen(false)} />}
    </div>
  );
}

/* ===== create / edit home modal ===== */
function CreateModal({onClose, db, onChange, toast, defaultHost, home}){
  const edit=!!home;
  const knownSlot=edit&&TIME_SLOTS.includes(home.time_slot);
  const [f,setF]=useState(edit
    ? {host_name:home.host_name||"",host_group:home.host_group==null?"":String(home.host_group),title:home.title||"",kind:home.kind||"Home",
       event_date:home.event_date||"",time_slot:(home.kind==="Call Out")?SLOT_CALLOUT:(knownSlot?home.time_slot:"อื่นๆ"),slotOther:knownSlot?"":(home.time_slot||""),
       channel:home.channel||"Online-Zoom",address:home.address||"",assists_needed:(home.assists_needed==null?9:home.assists_needed),
       host_contact:home.host_contact||"",note:home.note||"",intro_leader:home.intro_leader||"",zoom_manager:home.zoom_manager||"",promise_g:home.promise_g==null?"":String(home.promise_g),promise_r:home.promise_r==null?"":String(home.promise_r)}
    : {host_name:defaultHost||"",host_group:"",title:"",kind:"Home",event_date:"",time_slot:SLOT_EVENING,slotOther:"",
       channel:"Online-Zoom",address:"",assists_needed:9,host_contact:"",note:"",intro_leader:"",zoom_manager:"",promise_g:"",promise_r:""});
  const [busy,setBusy]=useState(false); const set=(k,v)=>setF(s=>({...s,[k]:v}));
  /* เปลี่ยนประเภท: ตอนสร้างใหม่ Home ตั้ง 9, Event/Call Out ตั้ง 0 (ปรับเองได้) */
  const setKind=(k)=>setF(s=>({...s,kind:k,time_slot:k==="Call Out"?SLOT_CALLOUT:(s.kind==="Call Out"?SLOT_EVENING:s.time_slot),...(edit?{}:{assists_needed:k==="Home"?9:0})}));
  const onsite=/onsite/i.test(f.channel); const ok=f.host_name.trim()&&f.event_date;
  const save=async()=>{ if(!ok) return; setBusy(true);
    try{ const slot=f.time_slot==="อื่นๆ"?(f.slotOther.trim()||"อื่นๆ"):f.time_slot;
      const payload={ host_name:f.host_name.trim(), host_group:(f.host_group===""?null:parseInt(f.host_group)), title:f.title.trim()||null, kind:f.kind||"Home", event_date:f.event_date, time_slot:slot,
        channel:f.channel, address:f.address.trim()||null, assists_needed:Math.min(30,Math.max(0,parseInt(f.assists_needed)||0)),
        host_contact:f.host_contact.trim()||null, note:f.note.trim()||null, intro_leader:f.intro_leader.trim()||null, zoom_manager:f.zoom_manager.trim()||null,
        promise_g:f.promise_g===""?null:(parseInt(f.promise_g)||0), promise_r:f.promise_r===""?null:(parseInt(f.promise_r)||0) };
      if(edit){ await db.updateHome(home.id,payload); toast("บันทึกการแก้ไขแล้ว"); }
      else{ await db.createHome({...payload, completed:false, result_g:null, result_r:null}); toast("สร้างงาน Home เรียบร้อย"); }
      onChange(); onClose();
    }catch(e){ toast((edit?"บันทึกไม่สำเร็จ: ":"สร้างไม่สำเร็จ: ")+(e.message||e)); setBusy(false); } };
  return (
    <div className="scrim" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-h"><div className="mark" style={{width:38,height:38}}><SVG d={I.cal} size={18}/></div>
          <div><h3>{edit?"แก้ไขงาน Home":"สร้างงาน Home Intro"}</h3><p>{edit?"ปรับแก้รายละเอียดงานนี้ได้ทั้งหมด แม้งานจะผ่านไปแล้ว":"เลือกผู้จัด วัน เวลา ช่องทาง และจำนวน Assist"}</p></div></div>
        <div className="modal-b">
          <div className="field"><label>ประเภทงาน</label>
            <div className="seg">
              {KINDS.map(k=>{ const m=KIND_META[k]; return <button key={k} type="button" className={"segbtn"+m.seg+(f.kind===k?" on":"")} onClick={()=>setKind(k)}><SVG d={m.icon} size={15}/>{k}</button>; })}
            </div></div>
          <div className="two">
            <div className="field"><label>ผู้จัด (Host) *</label>
              <input className="inp" list="rosterlist" value={f.host_name} placeholder="พิมพ์/เลือกชื่อ เช่น เอก กรฤต" onChange={e=>set("host_name",e.target.value)} /></div>
            <div className="field"><label>กลุ่ม (1–16)</label>
              <select className="sel" value={f.host_group} onChange={e=>set("host_group",e.target.value)}>
                <option value="">— เลือกกลุ่ม —</option>
                {Array.from({length:16},(_,i)=>i+1).map(n=><option key={n} value={n}>{"กลุ่ม "+n}</option>)}</select></div>
          </div>
          <div className="field"><label>ชื่องาน / หัวข้อ (ไม่บังคับ)</label>
            <input className="inp" value={f.title} placeholder="เว้นว่างได้ จะใช้ชื่อ Host เป็นหัวการ์ด" onChange={e=>set("title",e.target.value)} /></div>
          <div className="two">
            <div className="field"><label>Introduction Leader</label>
              <input className="inp" list="rosterlist" value={f.intro_leader} placeholder="เช่น แพรวฟ้า 66" onChange={e=>set("intro_leader",e.target.value)} /></div>
            <div className="field"><label>Zoom Manager</label>
              <input className="inp" list="rosterlist" value={f.zoom_manager} placeholder="เช่น สปาร์ค63" onChange={e=>set("zoom_manager",e.target.value)} /></div>
          </div>
          <div className="two">
            <div className="field"><label>วันที่ * <span style={{color:"var(--muted)",fontWeight:400}}>(ย้อนหลังได้ เพื่อเก็บ record)</span></label>
              <input className="inp" type="date" value={f.event_date} onChange={e=>set("event_date",e.target.value)} /></div>
            <div className="field"><label>เวลา</label>
              <select className="sel" value={f.time_slot} onChange={e=>set("time_slot",e.target.value)}>{(f.kind==="Call Out"?[SLOT_CALLOUT]:TIME_SLOTS).map(t=><option key={t} value={t}>{t}</option>)}</select></div>
          </div>
          {f.kind!=="Call Out" && f.time_slot==="อื่นๆ" && <div className="field"><label>ระบุเวลา</label>
            <input className="inp" value={f.slotOther} placeholder="เช่น 10.00 - 12.00 น." onChange={e=>set("slotOther",e.target.value)} /></div>}
          <div className="two">
            <div className="field"><label>Channel</label>
              <select className="sel" value={f.channel} onChange={e=>set("channel",e.target.value)}>{CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
            <div className="field"><label>จำนวน Assist ที่เปิดรับ (0–30 · Event ใส่ 0 ได้)</label>
              <input className="inp" type="number" min="0" max="30" value={f.assists_needed} onChange={e=>set("assists_needed",e.target.value)} /></div>
          </div>
          <div className="two">
            <div className="field"><label>🎯 Promise — เป้าหมายแขก (Guest) ของงานนี้</label>
              <input className="inp" type="number" min="0" value={f.promise_g} placeholder="เช่น 4" onChange={e=>set("promise_g",e.target.value)} /></div>
            <div className="field"><label>🎯 Promise — เป้าหมายลงทะเบียน (Register)</label>
              <input className="inp" type="number" min="0" value={f.promise_r} placeholder="เช่น 2" onChange={e=>set("promise_r",e.target.value)} /></div>
          </div>
          <div className="field"><label>{onsite?"ที่อยู่ (Onsite) *":"Address (ถ้าเป็น Onsite)"}</label>
            <input className="inp" value={f.address} placeholder={onsite?"กรอกสถานที่จัดงาน":"เว้นว่างได้ถ้าออนไลน์"} onChange={e=>set("address",e.target.value)} /></div>
          <div className="field"><label>ช่องทางติดต่อ Host</label>
            <input className="inp" value={f.host_contact} placeholder="LINE / เบอร์โทร" onChange={e=>set("host_contact",e.target.value)} /></div>
          <div className="field"><label>หมายเหตุ</label>
            <textarea className="ta" value={f.note} placeholder="รายละเอียดเพิ่มเติม" onChange={e=>set("note",e.target.value)} /></div>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>ยกเลิก</button>
          <button className="btn btn-primary" disabled={!ok||busy} onClick={save}><SVG d={I.check} size={15}/>{busy?"กำลังบันทึก…":(edit?"บันทึกการแก้ไข":"สร้างงาน")}</button>
        </div>
      </div>
    </div>
  );
}

/* ===== complete modal (G / R) ===== */
function CompleteModal({home, db, onChange, toast, onClose}){
  const [g,setG]=useState(home.result_g==null?"":String(home.result_g));
  const [r,setR]=useState(home.result_r==null?"":String(home.result_r));
  const [busy,setBusy]=useState(false); const isCall=(home.kind||"Home")==="Call Out";
  const save=async()=>{ setBusy(true);
    try{ await db.updateHome(home.id,{completed:true, result_g:g===""?0:(parseInt(g)||0), result_r:r===""?0:(parseInt(r)||0)});
      toast("บันทึกผลแล้ว → ย้ายไป Achieve"); onChange(); onClose();
    }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); setBusy(false); } };
  return (
    <div className="scrim" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal sm">
        <div className="modal-h"><div className="mark" style={{width:38,height:38}}><SVG d={I.flag} size={17}/></div>
          <div><h3>บันทึกผล {home.kind||"Home"}</h3><p>{home.title||home.host_name} · {fmtDate(home.event_date).day} {fmtDate(home.event_date).mo}</p></div></div>
        <div className="modal-b">
          <div className="two">
            <div className="field"><label>{isCall?"จำนวนที่ติดต่อ (ไม่นับ Guest)":"G — Guest (จำนวนแขก)"}</label>

  const persist=async(patch)=>{ try{ await db.updateGuest(g.id,patch); onChange(); }catch(e){ toast("บันทึกไม่สำเร็จ: "+(e.message||e)); } };

  const setInt=(v)=>{ set("interested",v); persist({interested:v}); };
  const toggleReg=async()=>{ const v=!f.registered; set("registered",v);
    try{ await db.updateGuest(g.id,{registered:v}); await recount(list.map(x=>x.id===g.id?{...x,registered:v}:x)); onChange(); }catch(e){ toast("ไม่สำเร็จ: "+(e.message||e)); } };
  const toggleAtt=async()=>{ const v=!f.attended; set("attended",v);

/* ตารางสรุปแขกในมุมมอง Host — รวมแขกจากทุกการ์ด พร้อมแหล่งที่มา (HI/CI/ES) */
function HostGuestTable({mine, central, hostName, guests, db, onChange, toast, onOpenHome}){
  const [fInt,setFInt]=useState(""); const [fReg,setFReg]=useState(""); const [fSrc,setFSrc]=useState(""); const [fAtt,setFAtt]=useState(""); const [q,setQ]=useState(""); const [sort,setSort]=useState({key:"date",dir:"desc"});
  const ids=new Set(mine.map(h=>h.id)); const homeById={}; mine.forEach(h=>homeById[h.id]=h); (central||[]).forEach(h=>homeById[h.id]=h);
  const hn=(hostName||"").trim().toLowerCase();
  /* แสดงแขก: จากอีเวนต์ของตัวเอง + แขกที่ตัวเองเป็นผู้เชิญ ในงานส่วนกลาง (Landmark) */
  const all=(guests||[]).filter(g=>{ const h=homeById[g.home_id]; if(!h) return false;
      if(ids.has(g.home_id)) return true;
      if(isCentral(h)&&hn&&(g.inviter||"").trim().toLowerCase()===hn) return true;
      return false; })
    .map(g=>({g,home:homeById[g.home_id]}))
    .sort((a,b)=>((b.home.event_date||"").localeCompare(a.home.event_date||""))||((a.g.created_at||"").localeCompare(b.g.created_at||"")));
  const qq=q.trim().toLowerCase();
  const rows=all.filter(r=>{
    if(fInt){ if(fInt==="ยังไม่ระบุ"){ if(r.g.interested) return false; } else if((r.g.interested||"")!==fInt) return false; }
    if(fAtt){ if(fAtt==="yes"&&!r.g.attended) return false; if(fAtt==="no"&&r.g.attended) return false; }
    if(fReg){ if(fReg==="yes"&&!r.g.registered) return false; if(fReg==="no"&&r.g.registered) return false; }
    if(fSrc && (r.home.kind||"Home")!==fSrc) return false;
    if(qq){ const hay=((r.g.guest_name||"")+" "+(r.g.nickname||"")+" "+(r.g.whats_so||"")).toLowerCase(); if(!hay.includes(qq)) return false; }
    return true;
  });
  const active=fInt||fReg||fSrc||fAtt||q;
  const sortVal=(r)=>{ switch(sort.key){

                const ac=signups.filter(s=>s.home_id===h.id).length; const need=h.assists_needed==null?9:h.assists_needed;
                const suc=!isCall&&isSuccessHome(h); const st=statusOf(h); const sc=stColor[st]||stColor["เลยวันแล้ว"];

/* ===== Progress Results report (ผลลัพธ์ที่คืบหน้าของโปรแกรมภาวะผู้นำ) ===== */
function beDate(s, full){ if(!s) return ""; const d=new Date(s+"T00:00:00"); const dd=String(d.getDate()).padStart(2,"0"); const mm=String(d.getMonth()+1).padStart(2,"0"); const by=d.getFullYear()+543; return dd+"/"+mm+"/"+(full?by:String(by).slice(-2)); }
const PROG_HEAD=[{k:"no_id",label:"NO เลขที่"},{k:"cohort",label:"รุ่น"},{k:"il_coach",label:"IL COACH โค้ชไอแอล"},{k:"staff_coach",label:"STAFF COACH โค้ชสตาฟ"},{k:"nickname",label:"NICKNAME ชื่อเล่น"},{k:"name",label:"NAME ชื่อ"}];
const PROG_NRM=(s)=>(s||"").trim().replace(/\s+/g," ");
function progressData(homes, guests, host, ps, pe){
  const key=PROG_NRM(host); const hostHomes=(homes||[]).filter(h=>PROG_NRM(h.host_name)===key);
  const homeById={}; hostHomes.forEach(h=>homeById[h.id]=h);
  const myGuests=(guests||[]).filter(g=>homeById[g.home_id]);
  const inP=(d)=> !!d && (!ps||d>=ps) && (!pe||d<=pe);
  const SRC={"Home":"HI","Center Intro":"CI","Evening Session":"ES","Call Out":"Per C/O"};
  const isReg=(g,h)=> (h.kind||"Home")==="Call Out" ? (g.call_status==="R"||!!g.registered) : !!g.registered;
  const guestRows=myGuests.filter(g=>{const h=homeById[g.home_id];const k=h.kind||"Home";return g.attended&&k!=="Call Out"&&inP(h.event_date);})
    .map(g=>{const h=homeById[g.home_id];return {name:(g.guest_name||g.nickname||"-"),src:SRC[h.kind||"Home"],date:h.event_date};})
    .sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const regRows=myGuests.filter(g=>{const h=homeById[g.home_id];return isReg(g,h)&&inP(h.event_date);})
    .map(g=>{const h=homeById[g.home_id];const k=h.kind||"Home";return {name:(g.guest_name||g.nickname||"-"),src:SRC[k],date:h.event_date};})
    .sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const callOuts=hostHomes.filter(h=>(h.kind||"Home")==="Call Out").sort((a,b)=>(a.event_date||"").localeCompare(b.event_date||""));
  const callRows=callOuts.map((h,i)=>({no:(h.co_session!=null&&h.co_session!=="")?h.co_session:"",date:h.event_date,time:h.time_slot})).filter(r=>inP(r.date));
  const assistCount=callOuts.length;
  const totalGuests=myGuests.filter(g=>{const h=homeById[g.home_id];return g.attended&&(h.kind||"Home")!=="Call Out"&&arrived(h);}).length;
  const totalReg=myGuests.filter(g=>{const h=homeById[g.home_id];return isReg(g,h)&&arrived(h);}).length;
  const homeIntroSuccess=hostHomes.filter(h=>(h.kind||"Home")==="Home").filter(h=>{
    if(!arrived(h)) return false; /* นับเฉพาะที่เกิดขึ้นแล้ว ไม่นับอนาคต */
    const att=myGuests.filter(g=>g.home_id===h.id&&g.attended).length; return Math.max(att,h.result_g||0)>=MIN_GUEST; }).length;
  return {guestRows, regRows, callRows, assistCount, totalGuests, totalReg, homeIntroSuccess};
}

function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
const GOAL_MILES=[{label:"Weekend 2",dates:["2026-06-20","2026-06-21"]},{label:"Weekend 3",dates:["2026-08-08","2026-08-09"]},{label:"Weekend 4",dates:["2026-09-26","2026-09-27"]}];
function pushWeeks(cols, fromStr, stopStr){ let cur=new Date(fromStr+"T00:00:00"); const stop=new Date(stopStr+"T00:00:00"); let n=0;
  while(cur<stop){ n++; let e=new Date(cur.getTime()+6*86400000); if(e>=stop) e=new Date(stop.getTime()-86400000);
    cols.push({label:String(n),s:ymd(cur),e:ymd(e),ms:false}); cur=new Date(e.getTime()+86400000); } }
function goalCols(){ const cols=[];
  cols.push({label:"Weekend 2",sub:"20-21 มิย",s:"2026-06-20",e:"2026-06-21",ms:true});
  pushWeeks(cols,"2026-06-22","2026-08-08");
  cols.push({label:"Weekend 3",sub:"8-9 สค",s:"2026-08-08",e:"2026-08-09",ms:true});
  pushWeeks(cols,"2026-08-10","2026-09-26");
  cols.push({label:"Weekend 4",sub:"26-27 กย",s:"2026-09-26",e:"2026-09-27",ms:true});
  return cols; }
const KIND_SHORT={"Home":"HI","Center Intro":"CI","Evening Session":"ES","Call Out":"C/O"};
function dDM(s){ if(!s) return ""; const d=new Date(s+"T00:00:00"); return d.getDate()+"/"+(d.getMonth()+1); }
function goalData(homes, guests, host){
  const key=nrm(host), hn=(host||"").trim().toLowerCase();
  const cols=goalCols(); const nC=cols.length;
  const colIdx=(d)=>{ if(!d) return -1; if(d<=cols[0].e) return 0; for(let i=0;i<nC;i++){ if(d>=cols[i].s&&d<=cols[i].e) return i; } return d>cols[nC-1].e?nC-1:-1; };
  const homeById={}; homes.forEach(h=>homeById[h.id]=h);
  const blank=()=>Array(nC).fill(0);
  const promise={intro:blank(),hi:blank(),reg:blank(),co:blank()};
  const actual={intro:blank(),hi:blank(),reg:blank(),co:blank()};
  const eventDates=new Set();
  const rowOfGuest=(k)=> k==="Home"?"hi":((k==="Center Intro"||k==="Evening Session")?"intro":null);
  homes.filter(h=>nrm(h.host_name)===key).forEach(h=>{ const ci=colIdx(h.event_date); const k=h.kind||"Home"; eventDates.add(h.event_date); if(ci<0) return;
    const gr=rowOfGuest(k); if(gr&&h.promise_g) promise[gr][ci]+=h.promise_g;
    if(h.promise_r){ if(k==="Call Out") promise.co[ci]+=h.promise_r; else promise.reg[ci]+=h.promise_r; } });
  (guests||[]).forEach(g=>{ const h=homeById[g.home_id]; if(!h) return; const inv=(g.inviter||"").trim().toLowerCase();
    const mine = inv ? inv===hn : nrm(h.host_name)===key; if(!mine) return;
    eventDates.add(h.event_date); const ci=colIdx(h.event_date); if(ci<0) return; const k=h.kind||"Home";
    if(g.attended){ const gr=rowOfGuest(k); if(gr) actual[gr][ci]++; }
    if(g.registered){ if(k==="Call Out") actual.co[ci]++; else actual.reg[ci]++; } });
  const ownHomes=homes.filter(h=>nrm(h.host_name)===key);
  const hiPromise=ownHomes.filter(h=>(h.kind||"Home")==="Home").length;
  const hiActual=ownHomes.filter(h=>(h.kind||"Home")==="Home"&&arrived(h)).length;
  /* งาน (Home/Event) ในแต่ละสัปดาห์ — ของตัวเอง + งานส่วนกลางที่ตัวเองเชิญแขก */
  const evByCol=cols.map(()=>[]); const seen={};
  const addEv=(h,central)=>{ if(seen[h.id]) return; seen[h.id]=1; const ci=colIdx(h.event_date); if(ci<0) return; evByCol[ci].push({kind:h.kind||"Home",date:h.event_date,central}); };
  ownHomes.forEach(h=>addEv(h,false));
  (guests||[]).forEach(g=>{ const h=homeById[g.home_id]; if(!h) return; const inv=(g.inviter||"").trim().toLowerCase(); if(inv===hn&&isCentral(h)&&nrm(h.host_name)!==key) addEv(h,true); });
  evByCol.forEach(a=>a.sort((x,y)=>(x.date||"").localeCompare(y.date||"")));
  return {cols, promise, actual, eventDates, hiPromise, hiActual, evByCol};
}

/* ===== dashboard ===== */
const nrm=(s)=>(s||"").trim().replace(/\s+/g," ")||"—";
/* เกณฑ์ Leadership Program: Home สำเร็จ = Guest ≥4 และลงทะเบียน ≥25% ของ Guest */
const CRIT_ORG=3, CRIT_GUEST=25, CRIT_REG=12, MIN_GUEST=4;
const isSuccessHome=(h)=> (h.result_g||0)>=MIN_GUEST && (h.result_r||0)*4>=(h.result_g||0);
function critStats(homes, hostName, guests){
  const key=nrm(hostName); const mine=homes.filter(h=>nrm(h.host_name)===key);
  const arr=mine.filter(arrived); /* นับ Guest/ลงทะเบียน/สำเร็จ เฉพาะงานที่ถึงวันแล้ว */
  const hn=(hostName||"").trim().toLowerCase();
  /* อีเวนต์ส่วนกลาง (Landmark) ที่ตัวเองร่วม (เป็นผู้เชิญ ≥1 คน) และผ่านไปแล้ว — นับรวมในสถิติกิจกรรม */
  const centralPart=hn?homes.filter(h=>isCentral(h)&&nrm(h.host_name)!==key&&arrived(h)&&(guests||[]).some(g=>g.home_id===h.id&&(g.inviter||"").trim().toLowerCase()===hn)):[];
  const cnt=k=>mine.filter(h=>(h.kind||"Home")===k).length+centralPart.filter(h=>(h.kind||"Home")===k).length;
  const sucCnt=k=>arr.filter(h=>(h.kind||"Home")===k&&isSuccessHome(h)).length;
  /* Guest / ลงทะเบียน — นับตาม "ผู้เชิญ" เป็นหลัก: ถ้าระบุผู้เชิญ → นับให้ผู้เชิญ, ถ้าไม่ระบุ → นับให้ Host (เจ้าของงาน)
     เฉพาะที่ติ๊ก "มา"/"ลงทะเบียน" ในงานที่เกิดไปแล้ว (arrived) · Guest ไม่นับ Call Out · ลงทะเบียนนับทุกช่องทาง */
  const homeById={}; homes.forEach(h=>homeById[h.id]=h);
  const gList=guests||[];
  const hasIndiv=(hid)=>gList.some(g=>g.home_id===hid);
  const mineFor=(g,h)=>{ const inv=(g.inviter||"").trim().toLowerCase(); return inv ? (inv===hn) : (nrm(h.host_name)===key); };
  let guest=0, reg=0;
  gList.forEach(g=>{ const h=homeById[g.home_id]; if(!h||!arrived(h)||!mineFor(g,h)) return;
    if(g.attended && (h.kind||"Home")!=="Call Out") guest++;
    if(g.registered) reg++; });
  /* งานของตัวเองที่ยังไม่มีรายชื่อรายคน (กรอกผลรวมเอง) — นับผลรวมให้ Host */
  arr.forEach(h=>{ if(hasIndiv(h.id)) return; if((h.kind||"Home")!=="Call Out") guest+=(h.result_g||0); reg+=(h.result_r||0); });
  const orgSuccess=arr.filter(h=>(h.kind||"Home")==="Home"&&isSuccessHome(h)).length;
  const c1=orgSuccess>=CRIT_ORG, c2=guest>=CRIT_GUEST, c3=reg>=CRIT_REG;
  return { name:hostName, total:mine.length+centralPart.length, home:cnt("Home"), homeSuccess:sucCnt("Home"),
    center:cnt("Center Intro"), evening:cnt("Evening Session"), call:cnt("Call Out"),
    orgSuccess, guest, reg, c1, c2, c3, passed:(c1?1:0)+(c2?1:0)+(c3?1:0) };
}
function CritItem({label, icon, cur, goal, unit, met}){
  const pct=Math.min(100,Math.round(cur/goal*100));
  return (
    <div className={"crit"+(met?" met":"")}>
      <div className="ct"><SVG d={met?I.check:icon} size={15}/>{label}</div>
      <div className="cv">{cur}<small> / {goal} {unit}</small></div>
      <div className="cbar"><i style={{width:pct+"%"}}/></div>
      <div className="cstat">{met?"ผ่านเกณฑ์แล้ว ✓":"อีก "+(goal-cur)+" "+unit}</div>
    </div>
  );
}

function StatLeaders({title, icon, rows, unit, accent}){

function DashboardView({homes, signups, guests}){
  const [q,setQ]=useState("");
  /* ---- รวมสถิติฝั่งผู้จัด Home ---- */
  const hostMap={};
  homes.forEach(h=>{ const k=nrm(h.host_name); const o=hostMap[k]||(hostMap[k]={name:k,homes:0,homeOnly:0,homeSuc:0,done:0,g:0,r:0,list:[]});
    o.homes++; o.list.push(h); const ar=arrived(h);
    if((h.kind||"Home")==="Home"){ o.homeOnly++; if(ar&&isSuccessHome(h)) o.homeSuc++; }
    o.g+=(ar&&(h.kind||"Home")!=="Call Out"?(h.result_g||0):0); o.r+=(ar?(h.result_r||0):0);
    if(h.completed) o.done++; });
  const hostRows=Object.values(hostMap);
  /* ---- รวมสถิติฝั่งผู้ช่วย Assist ---- */
  const assistMap={};
  signups.forEach(s=>{ const k=nrm(s.assist_name); const o=assistMap[k]||(assistMap[k]={name:k,count:0,homeIds:[]});
    o.count++; o.homeIds.push(s.home_id); });
  const assistRows=Object.values(assistMap);
  /* ---- ยอดรวม ---- */
  const doneHomes=homes.filter(h=>h.completed);
  const totalG=doneHomes.reduce((n,h)=>n+((h.kind||"Home")==="Call Out"?0:(h.result_g||0)),0);
  const totalR=doneHomes.reduce((n,h)=>n+(h.result_r||0),0);
  /* ---- แยกตามประเภท (4 ชนิด) ---- */
  const grOf=(arr)=>arr.reduce((o,h)=>(h.completed?{g:o.g+(h.result_g||0),r:o.r+(h.result_r||0),done:o.done+1}:o),{g:0,r:0,done:0});
  const kindStats=KINDS.map(k=>{ const items=homes.filter(h=>(h.kind||"Home")===k); return {kind:k, count:items.length, gr:grOf(items)}; });
  /* ---- เกณฑ์รายคน (ทุกคนที่เคยจัดงาน) ---- */
  const critList=Object.keys(hostMap).map(n=>critStats(homes,n,guests)).sort((a,b)=>b.passed-a.passed||b.orgSuccess-a.orgSuccess||b.guest-a.guest);
  const qualified=critList.filter(s=>s.passed===3).length;
  /* ---- leaderboards ---- */
  const hostLeaders=hostRows.filter(h=>h.homeOnly>0).sort((a,b)=>b.homeOnly-a.homeOnly||b.homeSuc-a.homeSuc)
    .map(h=>({name:h.name,val:h.homeOnly,sub:"สำเร็จ "+h.homeSuc+" · ไม่สำเร็จ "+(h.homeOnly-h.homeSuc)}));
  const assistLeaders=assistRows.slice().sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name))
    .map(a=>({name:a.name,val:a.count,sub:null}));
  const guestLeaders=hostRows.filter(h=>h.g>0).sort((a,b)=>b.g-a.g||b.r-a.r)
    .map(h=>({name:h.name,val:h.g,sub:"รวมทุกงาน · "+h.r+" ลงทะเบียน"}));
  const regLeaders=hostRows.filter(h=>h.r>0).sort((a,b)=>b.r-a.r||b.g-a.g)
    .map(h=>({name:h.name,val:h.r,sub:"รวมทุกงาน · "+h.g+" Guest"}));
  /* ---- person lookup ---- */
  const homeById={}; homes.forEach(h=>homeById[h.id]=h);
  const allNames=Array.from(new Set([...Object.keys(hostMap),...Object.keys(assistMap)])).sort();
  const name=nrm(q); const sel=q.trim()?name:"";
  const pHost=sel?hostMap[sel]:null, pAssist=sel?assistMap[sel]:null;
  const helped=pAssist?pAssist.homeIds.map(id=>homeById[id]).filter(Boolean)
    .sort((a,b)=>(b.event_date||"").localeCompare(a.event_date||"")):[];
  return (
    <div className="wrap page">
      <div className="sec-h"><div><div className="eyebrow">Dashboard · สถิติทีม ILP69</div>
        <h2>ใครจัด Home · ใคร Assist · ผลรวม Guest / Register</h2>
        <p>สถิติสะสมจากทุกงานในระบบ · กดดูรายบุคคลได้ที่ช่องค้นหาด้านล่าง</p></div></div>
      <div className="statgrid">
        <div className="stat"><div className="k"><SVG d={I.cal} size={15}/>งานทั้งหมด</div><div className="v">{homes.length}</div><div className="s">จบแล้ว {doneHomes.length} · กำลังจะถึง {homes.length-doneHomes.length}</div></div>
        <div className="stat amber"><div className="k"><SVG d={I.users} size={15}/>Guest (แขกที่มา)</div><div className="v">{totalG}</div><div className="s">งานที่จบแล้ว · ไม่รวม Call Out</div></div>
        <div className="stat green"><div className="k"><SVG d={I.flag} size={15}/>Register (ลงทะเบียน)</div><div className="v">{totalR}</div><div className="s">รวมจากงานที่จบแล้ว</div></div>
        <div className="stat"><div className="k"><SVG d={I.user} size={15}/>ผู้จัดงาน</div><div className="v">{hostRows.length}</div><div className="s">คนที่เคยเปิดงาน</div></div>
        <div className="stat"><div className="k"><SVG d={I.star} size={15}/>การลงชื่อ Assist</div><div className="v">{signups.length}</div><div className="s">{assistRows.length} คนไม่ซ้ำ</div></div>
      </div>

      <div className="eyebrow" style={{marginBottom:10}}>แยกตามประเภท</div>
      <div className="statgrid">
        {kindStats.map(ks=>{ const m=KIND_META[ks.kind]||KIND_META.Home; const isC=ks.kind==="Call Out";
          return (
            <div className="stat" key={ks.kind} style={{background:m.bg}}>
              <div className="k"><SVG d={m.icon} size={15}/>งาน {ks.kind}</div>
              <div className="v" style={{color:m.fg}}>{ks.count}</div>
              <div className="s">จบแล้ว {ks.gr.done} · <b>{ks.gr.g}</b> {isC?"ติดต่อ":"Guest"} · <b>{ks.gr.r}</b> Reg{isC?<span style={{opacity:.7}}> (ไม่นับ G)</span>:""}</div>
            </div>); })}
      </div>

      <div className="dash-cols">
        <StatLeaders title="จัด Home มากสุด" icon={I.trophy} rows={hostLeaders} unit="งาน" />
        <StatLeaders title="Assist มากสุด" icon={I.star} rows={assistLeaders} unit="ครั้ง" accent="amber" />
      </div>
      <div className="dash-cols" style={{marginTop:18}}>
        <StatLeaders title="จำนวน Guest มากที่สุด" icon={I.users} rows={guestLeaders} unit="คน" />
        <StatLeaders title="จำนวนลงทะเบียน มากที่สุด" icon={I.flag} rows={regLeaders} unit="คน" accent="amber" />
      </div>
    </div>
  );
}

/* ===== เกณฑ์รายคน + สถิติรายบุคคล (แท็บแยก) ===== */
function CriteriaView({homes, signups, guests}){
  const [q,setQ]=useState(""); const [fGroup,setFGroup]=useState(""); const [sort,setSort]=useState("group");
  const homeById={}; homes.forEach(h=>homeById[h.id]=h);
  const groupOf=(name)=>{ const hs=homes.filter(h=>nrm(h.host_name)===nrm(name)&&h.host_group!=null);
    if(!hs.length) return null; const c={}; hs.forEach(h=>{c[h.host_group]=(c[h.host_group]||0)+1;});
    return parseInt(Object.keys(c).sort((a,b)=>c[b]-c[a])[0]); };
  const names=Array.from(new Set([...HOST_ROSTER, ...homes.map(h=>nrm(h.host_name))])).filter(Boolean);
  let rows=names.map(n=>({...critStats(homes,n,guests), group:groupOf(n)}));
  const groups=Array.from(new Set(rows.map(r=>r.group).filter(g=>g!=null))).sort((a,b)=>a-b);
  const qualified=rows.filter(r=>r.passed===3).length, activeN=rows.filter(r=>r.total>0).length;
  if(fGroup) rows=rows.filter(r=> fGroup==="none"? r.group==null : String(r.group)===fGroup);
  if(sort==="group") rows.sort((a,b)=> (a.group==null?99:a.group)-(b.group==null?99:b.group) || b.passed-a.passed || b.orgSuccess-a.orgSuccess || a.name.localeCompare(b.name,"th"));
  else rows.sort((a,b)=> b.passed-a.passed || b.orgSuccess-a.orgSuccess || b.guest-a.guest || a.name.localeCompare(b.name,"th"));
  const sel=q.trim()?nrm(q):"";
  const selStats=sel?critStats(homes,sel,guests):null;
  const mineHomes=sel?homes.filter(h=>nrm(h.host_name)===sel).sort((a,b)=>(b.event_date||"").localeCompare(a.event_date||"")):[];
  const helped=sel?signups.filter(s=>nrm(s.assist_name)===sel).map(s=>homeById[s.home_id]).filter(Boolean).sort((a,b)=>(b.event_date||"").localeCompare(a.event_date||"")):[];
  const allNames=Array.from(new Set([...names, ...signups.map(s=>nrm(s.assist_name))])).sort((a,b)=>a.localeCompare(b,"th"));
  return (
    <div className="wrap page">
      <div className="sec-h"><div><div className="eyebrow">เกณฑ์รายคน · Leadership Program</div>
        <h2>การผ่านเกณฑ์ และสถิติรายบุคคล</h2>
        <p>รายชื่อครบทุกคน · กรอง/เรียงตามกลุ่มได้ · กดชื่อเพื่อดูสถิติรายบุคคล · ทำงานแล้ว {activeN} คน · ผ่านครบ {qualified} คน</p></div></div>
      <div className="filterbar">
        <div className="field"><label><SVG d={I.search} size={13}/>ค้นหา / เลือกคน</label>
          <input className="inp" list="critnames" value={q} placeholder="พิมพ์ชื่อเพื่อดูรายบุคคล" onChange={e=>setQ(e.target.value)} />
          <datalist id="critnames">{allNames.map(n=><option key={n} value={n}/>)}</datalist></div>
        <div className="field"><label><SVG d={I.user} size={13}/>กลุ่ม</label>
          <select className="sel" value={fGroup} onChange={e=>setFGroup(e.target.value)}>
            <option value="">— ทุกกลุ่ม —</option>
            {groups.map(g=><option key={g} value={String(g)}>กลุ่ม {g}</option>)}
            <option value="none">ไม่ระบุกลุ่ม</option></select></div>
        <div className="field"><label><SVG d={I.chart} size={13}/>เรียงตาม</label>
          <select className="sel" value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="group">กลุ่ม</option>
            <option value="passed">ผ่านเกณฑ์มากสุด</option></select></div>
        <div className="res">แสดง <b>{rows.length}</b> คน</div>
        {(q||fGroup) && <button className="btn btn-sm" onClick={()=>{setQ("");setFGroup("");}}><SVG d={I.x} size={14}/>ล้าง</button>}
      </div>

      {selStats && <CriteriaPanel s={selStats}/>}
      {sel && (mineHomes.length>0||helped.length>0) && <div className="panel">
        {mineHomes.length>0 && <div style={{marginBottom:helped.length?14:0}}>
          <div className="lead-sub" style={{marginBottom:6,fontWeight:600}}>งานที่จัด ({mineHomes.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {mineHomes.map(h=>{ const {day,mo}=fmtDate(h.event_date);
              return <span className="tagperson" key={h.id}><SVG d={(KIND_META[h.kind||"Home"]||KIND_META.Home).icon} size={13}/>{day} {mo} · {h.kind||"Home"}{h.completed?" · "+resultText(h):""}</span>; })}
          </div></div>}
        {helped.length>0 && <div>
          <div className="lead-sub" style={{marginBottom:6,fontWeight:600}}>เคยไปช่วยงานของ ({helped.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {helped.map((h,i)=>{ const {day,mo}=fmtDate(h.event_date);
              return <span className="tagperson" key={h.id+"_"+i}><span className="ava" style={{width:22,height:22}}>{initials(h.host_name)}</span>{h.host_name} · {day} {mo}</span>; })}
          </div></div>}
      </div>}

      <div className="panel">
        <h3 style={{display:"flex",alignItems:"center",gap:8}}><SVG d={I.trophy} size={18}/>รายชื่อทั้งหมด</h3>
        <p className="lead">เกณฑ์: จัด Home สำเร็จ ≥ {CRIT_ORG} · Guest ≥ {CRIT_GUEST} · ลงทะเบียน ≥ {CRIT_REG} (Home สำเร็จ = Guest ≥ {MIN_GUEST} & ลงทะเบียน ≥ 25%)</p>
        {rows.length===0 ? <div className="empty-assist">ไม่พบรายชื่อตามตัวกรอง</div> :
          <div>{rows.map((r,i)=>{
            const showHdr=sort==="group"&&(i===0||rows[i-1].group!==r.group);
            return (
              <React.Fragment key={r.name}>
                {showHdr && <div className="grpdiv">{r.group!=null?("กลุ่ม "+r.group):"ไม่ระบุกลุ่ม"}</div>}
                <div className={"lead-row click"+(sel===nrm(r.name)?" sel":"")} onClick={()=>setQ(r.name)}>
                  <span className="ava" style={{flex:"0 0 auto"}}>{initials(r.name)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="lead-name">{r.name}</div>
                    <div className="lead-sub">{r.group!=null?("กลุ่ม "+r.group+" · "):""}Home {r.home} · CI {r.center} · ES {r.evening} · Call {r.call}</div></div>
                  <span className={"cpill"+(r.c1?" ok":"")}>จัด {r.orgSuccess}/{CRIT_ORG}</span>
                  <span className={"cpill"+(r.c2?" ok":"")}>G {r.guest}/{CRIT_GUEST}</span>
                  <span className={"cpill"+(r.c3?" ok":"")}>R {r.reg}/{CRIT_REG}</span>
                  <span className={"cstatus"+(r.passed===3?" done":"")}>{r.passed===3?"ผ่าน ✓":r.passed+"/3"}</span>
                </div>
              </React.Fragment>);
          })}</div>}
      </div>
    </div>
  );
}
