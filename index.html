        <SVG d={mode==="live"?I.check:I.clock} size={18}/>
        <div>{mode==="live"? <b>กำลังใช้งานแบบแชร์จริง (Supabase) — ข้อมูลซิงก์ให้ทุกคน</b>
          : <><b>ตอนนี้อยู่ในโหมดทดลอง</b> — มีข้อมูล {SEED.length} งานจากตาราง ILP69 ให้ดูแล้ว แต่เก็บในเครื่องนี้เท่านั้น เชื่อมต่อ Supabase ด้านล่างเพื่อใช้งานจริง</>}</div></div></div>
      <div className="panel">
        <h3>ขั้นตอนติดตั้ง (ครั้งเดียว)</h3><p className="lead">ทำตาม 3 ขั้น แล้ววางลิงก์แอปส่งให้ทีมได้เลย</p>
        <ol className="steps">
          <li>เปิดโปรเจกต์ Supabase → <b>SQL Editor</b> → วางสคริปต์ → กด <b>Run</b></li>
          <li><b>Project Settings → API</b> คัดลอก <b>Project URL</b> และ <b>anon / publishable key</b></li>
          <li>วางด้านล่าง → กด <b>เชื่อมต่อ</b> → (ถ้าต้องการ) กด <b>นำเข้าข้อมูล ILP69</b></li>
        </ol>
        <div style={{position:"relative",marginTop:6}}>
          <button className="btn btn-sm" style={{position:"absolute",top:10,right:10,zIndex:2}} onClick={copy}>คัดลอก SQL</button>
          <pre className="sql">{SQL_SETUP}</pre></div>
      </div>
      <div className="panel">
        <h3>ใส่ค่าการเชื่อมต่อ</h3><p className="lead">anon/publishable key เปิดเผยได้ตามปกติ ปลอดภัยด้วย RLS</p>
        <div className="field" style={{marginBottom:12}}><label>Project URL</label>
          <input className="inp" value={url} placeholder="https://xxxxx.supabase.co" onChange={e=>setUrl(e.target.value)} /></div>
        <div className="field" style={{marginBottom:16}}><label>anon / publishable key</label>
          <input className="inp" value={key} placeholder="sb_publishable_... หรือ eyJ..." onChange={e=>setKey(e.target.value)} /></div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn btn-primary" disabled={testing} onClick={test}><SVG d={I.check} size={15}/>{testing?"กำลังทดสอบ…":"ทดสอบ & เชื่อมต่อ"}</button>
          {mode==="live" && <button className="btn btn-amber" disabled={importing} onClick={doImport}>{importing?"กำลังนำเข้า…":"นำเข้าข้อมูล ILP69 ("+SEED.length+" งาน)"}</button>}
          {mode==="live" && <button className="btn" onClick={()=>{clearCfg();onDisconnect();toast("ตัดการเชื่อมต่อแล้ว");}}>ตัดการเชื่อมต่อ</button>}
        </div>
      </div>
      <div className="panel">
        <h3>นำไปใช้งานจริง (Deploy)</h3>
        <ul style={{margin:0,paddingLeft:18,color:"var(--ink-soft)",fontSize:14,lineHeight:1.8}}>
          <li><b>Vercel / Netlify / GitHub Pages</b> — อัปโหลด index.html ไฟล์เดียวก็ใช้ได้</li>
          <li>ไม่อยากให้แต่ละคนตั้งค่าเอง — ใส่ค่าในตัวแปร <b>HARDCODED_URL / HARDCODED_KEY</b> ต้นไฟล์</li>
        </ul>
      </div>
    </div>
  );
}

/* ===== hidden change-log (เปิดด้วยการพิมพ์ 8888) ===== */
function fmtLogTime(s){ try{ const d=new Date(s); return new Intl.DateTimeFormat("th-TH",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}).format(d); }catch(e){ return s||""; } }
function LogModal({db, onClose}){
  const [rows,setRows]=useState(null); const [q,setQ]=useState("");
  const load=useCallback(async()=>{ try{ setRows(await db.listLog(400)); }catch(e){ setRows([]); } },[db]);
  useEffect(()=>{ load(); },[load]);
  const actions=rows?Array.from(new Set(rows.map(r=>r.action))).sort():[];
  const list=(rows||[]).filter(r=>!q||r.action===q);
  return (
    <div className="scrim" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal lg">
        <div className="modal-h"><div className="mark" style={{width:38,height:38}}><SVG d={I.clock} size={18}/></div>
          <div style={{flex:1}}><h3>บันทึกการเปลี่ยนแปลง (Log)</h3>
            <p>หน้าซ่อน · เปิดด้วยการพิมพ์ 8888 · ล่าสุด {rows?rows.length:0} รายการ</p></div>
          <button className="btn btn-sm" onClick={load} style={{marginRight:8}}>รีเฟรช</button>
          <button className="xbtn" onClick={onClose}><SVG d={I.x} size={18}/></button></div>
        <div className="modal-b">
          <div className="filterbar" style={{marginBottom:14}}>
            <div className="field"><label><SVG d={I.search} size={13}/>กรองประเภท</label>
              <select className="sel" value={q} onChange={e=>setQ(e.target.value)}>
                <option value="">— ทั้งหมด —</option>
                {actions.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
            <div className="res">แสดง <b>{list.length}</b> รายการ</div>
          </div>
          {rows===null ? <div className="empty-assist">กำลังโหลด…</div> :
           list.length===0 ? <div className="empty-assist">ยังไม่มีบันทึก</div> :
           <div className="gwrap" style={{maxHeight:"60vh"}}>
             <table className="sumtbl">
               <thead><tr><th>เวลา</th><th>การกระทำ</th><th>รายละเอียด</th></tr></thead>
               <tbody>
                 {list.map(r=>(
                   <tr key={r.id}><td style={{whiteSpace:"nowrap",color:"var(--muted)"}}>{fmtLogTime(r.created_at)}</td>
                     <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{r.action}</td>
                     <td>{r.detail}</td></tr>))}
               </tbody>
             </table>
           </div>}
        </div>
        <div className="modal-f"><button className="btn" onClick={onClose}>ปิด</button></div>
      </div>
    </div>
  );
}

/* ===== app shell ===== */
function App(){
  const [cfg,setCfg]=useState(loadCfg());
  const dataRef=useRef({homes:[],signups:[],guests:[]});
  const [db,setDb]=useState(()=>{ const c=loadCfg(); return withLog(c?makeSupabaseDB(c):makeDemoDB(), ()=>dataRef.current); });
  const [tab,setTab]=useState("board");
  const [homes,setHomes]=useState([]); const [signups,setSignups]=useState([]); const [guests,setGuests]=useState([]); const [weeklies,setWeeklies]=useState([]); const [progress,setProgress]=useState([]); const [goals,setGoals]=useState([]);
  const [loading,setLoading]=useState(true); const [showCreate,setShowCreate]=useState(false); const [showLog,setShowLog]=useState(false);
  const [focusId,setFocusId]=useState(()=>{ const m=(window.location.hash||"").match(/home=([\w-]+)/); return m?m[1]:null; });
  const focusedRef=useRef(false);
  const [toastMsg,setToastMsg]=useState(""); const toastT=useRef();
  const toast=useCallback((m)=>{ setToastMsg(m); clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToastMsg(""),2600); },[]);
  const refresh=useCallback(async()=>{ try{ const [h,s,g,w,pg,gl]=await Promise.all([db.listHomes(),db.listSignups(),db.listGuests(),db.listWeekly(),db.listProgress(),db.listGoals?db.listGoals():Promise.resolve([])]); setHomes(h); setSignups(s); setGuests(g); setWeeklies(w); setProgress(pg); setGoals(gl||[]); dataRef.current={homes:h,signups:s,guests:g}; }
    catch(e){ toast("โหลดข้อมูลไม่สำเร็จ: "+(e.message||e)); } setLoading(false); },[db,toast]);
  useEffect(()=>{ setLoading(true); refresh(); const off=db.subscribe(()=>refresh()); return off; },[db,refresh]);
  useEffect(()=>{ const f=()=>refresh(); window.addEventListener("focus",f); const iv=setInterval(refresh,20000);
    return ()=>{window.removeEventListener("focus",f);clearInterval(iv);}; },[refresh]);
  useEffect(()=>{ const onHash=()=>{ const m=(window.location.hash||"").match(/home=([\w-]+)/); if(m){ focusedRef.current=false; setFocusId(m[1]); } };
    window.addEventListener("hashchange",onHash); return ()=>window.removeEventListener("hashchange",onHash); },[]);
  useEffect(()=>{ let buf=""; const onKey=(e)=>{ if(/^[0-9]$/.test(e.key)){ buf=(buf+e.key).slice(-4); if(buf==="8888"){ buf=""; setShowLog(true); } } else buf=""; };
    window.addEventListener("keydown",onKey); return ()=>window.removeEventListener("keydown",onKey); },[]);
  useEffect(()=>{ if(loading||!focusId||focusedRef.current) return;
    const h=homes.find(x=>x.id===focusId); if(!h){ return; } focusedRef.current=true;
    setTab(isArchived(h)?"archive":"board");
    const t=setTimeout(()=>{ const el=document.getElementById("home-"+focusId);
      if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),1700); }
    },450); return ()=>clearTimeout(t);
  },[loading,focusId,homes]);
  const connect=()=>{ const c=loadCfg(); setCfg(c); setDb(withLog(makeSupabaseDB(c), ()=>dataRef.current)); setTab("board"); };
  const disconnect=()=>{ setCfg(null); setDb(withLog(makeDemoDB(), ()=>dataRef.current)); };
  const upcomingN=homes.filter(h=>!isArchived(h)).length, pastN=homes.filter(isArchived).length;
  const TABS=[{id:"board",label:"บอร์ด",n:upcomingN},{id:"archive",label:"Achieve",n:pastN},{id:"dash",label:"Dashboard"},{id:"members",label:"เกณฑ์รายคน"},{id:"host",label:"มุมมอง Host"}];
  return (
    <div>
      <datalist id="rosterlist">{HOST_ROSTER.map(n=><option key={n} value={n}/>)}</datalist>
      <div className="topbar">
        <div className="topbar-in">
          <div className="brand"><div className="mark"><div><b>69</b><small>ILP</small></div></div>
            <div className="brand-txt"><h1>ILP69 Home · บอร์ดลงชื่อ Assist</h1><p>ผู้จัด Home เปิดงาน · ทีมงานมาลงชื่อช่วยกัน</p></div></div>
          <div className="status"><span className={"dot"+(db.mode==="live"?" live":"")}></span>{db.mode==="live"?"แชร์สด":"โหมดทดลอง"}</div>
        </div>
        <div className="tabs">{TABS.map(t=>(
          <button key={t.id} className="tab" aria-selected={tab===t.id} onClick={()=>setTab(t.id)}>{t.label}{typeof t.n==="number"&&<span className="pill">{t.n}</span>}</button>))}</div>
        <div className="tabsep"></div>
      </div>
      {loading
        ? <div className="wrap page"><div className="deck">{[0,1,2,3].map(i=>
            <div className="card" key={i} style={{padding:18}}>
              <div className="skeleton" style={{height:34,width:90,marginBottom:10}}/>
              <div className="skeleton" style={{height:14,width:"70%",marginBottom:8}}/>
              <div className="skeleton" style={{height:14,width:"50%",marginBottom:18}}/>
              <div className="skeleton" style={{height:44,width:"100%"}}/></div>)}</div></div>
        : <>
            {tab==="board"   && <BoardView   homes={homes} signups={signups} guests={guests} db={db} onChange={refresh} toast={toast} onCreate={()=>setShowCreate(true)} />}
            {tab==="archive" && <ArchiveView homes={homes} signups={signups} guests={guests} db={db} onChange={refresh} toast={toast} />}
            {tab==="dash"    && <DashboardView homes={homes} signups={signups} guests={guests} />}
            {tab==="members" && <CriteriaView homes={homes} signups={signups} guests={guests} />}
            {tab==="host"    && <HostView    homes={homes} signups={signups} guests={guests} weeklies={weeklies} progress={progress} goals={goals} db={db} onChange={refresh} toast={toast} onCreate={()=>setShowCreate(true)} />}
          </>}
      {showCreate && <CreateModal db={db} onChange={refresh} toast={toast} onClose={()=>setShowCreate(false)} />}
      {showLog && <LogModal db={db} onClose={()=>setShowLog(false)} />}
      <Toast msg={toastMsg} />
      <div className="footer"><span>ILP69 Home Assist Board</span>
        <span>{db.mode==="live"?"เชื่อมต่อฐานข้อมูลกลางแล้ว":"โหมดทดลอง · ไปที่ ตั้งค่า เพื่อเปิดใช้แบบแชร์"}</span></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
